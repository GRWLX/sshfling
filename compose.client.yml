name: timed-ssh-client

services:
  ssh-client:
    build:
      context: ./ssh-client
    image: timed-ssh-client:latest
    container_name: timed-ssh-client
    environment:
      SSH_HOST: "${SSH_HOST:-ssh-server}"
      SSH_PORT: "${SSH_PORT:-22}"
      SSH_USER: "${SSH_USER:-deploy}"
      SSH_PRIVATE_KEY: /run/secrets/ssh_private_key
      SSH_KNOWN_HOSTS: "${SSH_KNOWN_HOSTS:-}"
      SSH_KNOWN_HOSTS_FILE: "${SSH_KNOWN_HOSTS_FILE:-}"
      SSH_HOST_KEY_SHA256: "${SSH_HOST_KEY_SHA256:-}"
      SSH_COMMAND: "${SSH_COMMAND:-whoami && hostname && date -u}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    secrets:
      - source: ssh_private_key
        target: ssh_private_key
        mode: 0444
    networks:
      - timed-ssh-net

secrets:
  ssh_private_key:
    file: ./secrets/client_ed25519

networks:
  timed-ssh-net:
    external: true
