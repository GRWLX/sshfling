name: Release packages with public web

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version. Defaults to the tag name or bin/fling VERSION."
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: public-package-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev file rpm

      - name: Build Debian and RPM packages
        env:
          FLING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./packaging/build-deb.sh
          ./packaging/build-rpm.sh
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=build \
            --exclude=dist \
            --transform "s,^,fling-${FLING_VERSION}/," \
            -czf "dist/fling-${FLING_VERSION}.tar.gz" \
            .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Build macOS package
        env:
          FLING_VERSION: ${{ steps.version.outputs.version }}
        run: ./packaging/build-pkg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: dist/*.pkg
          if-no-files-found: error

  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if ($env:INPUT_VERSION) {
            $version = $env:INPUT_VERSION
          } elseif ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $match = Select-String -Path "bin/fling" -Pattern '^VERSION = "([^"]+)"' | Select-Object -First 1
            $version = $match.Matches[0].Groups[1].Value
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Build Windows MSI
        shell: pwsh
        env:
          FLING_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File packaging/build-msi.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.msi
          if-no-files-found: error

  pages:
    name: Publish package web
    runs-on: ubuntu-latest
    needs:
      - linux
      - macos
      - windows
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: package-dist
          merge-multiple: true

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev createrepo-c

      - name: Build public package site
        env:
          VERSION: ${{ needs.linux.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: bash packaging/build-public-web.sh package-dist public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
