name: Release packages with public web

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version. Defaults to the tag name or bin/sshfling VERSION."
        required: false
        type: string
      generate_test_signing_key:
        description: "Generate an ephemeral repository signing key for test package sites. Do not use for production tags."
        required: false
        default: false
        type: boolean
      publish:
        description: "Deploy the verified package site to GitHub Pages. Leave false for dry-run verification."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: public-package-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  language-catalog:
    name: Validated language catalog
    uses: ./.github/workflows/language-runtime-validation.yml
    with:
      version: ${{ github.event.inputs.version || '' }}

  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cargo cmake composer dpkg-dev elvish file fish g++ guile-3.0 \
            liblua5.1-0-dev liblua5.4-dev lua5.1 lua5.4 luarocks make mawk maven \
            ninja-build php-cli php-zip pkg-config rpm ruby ruby-dev rust-clippy \
            rustfmt sed tcl zip zsh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python package tools
        run: python -m pip install --disable-pip-version-check "setuptools>=68" wheel pipx

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            packaging/java/pom.xml
            packaging/java/consumers/*/pom.xml
            packaging/java/consumers/*/build.gradle.kts

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate sources
        run: make test

      - name: Build Linux and language ecosystem packages
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
          SSHFLING_REQUIRE_PIPX: "1"
          SSHFLING_RUST_PUBLISH_DRY_RUN: "1"
        run: |
          set -euo pipefail
          export SSHFLING_MAVEN_REPO_LOCAL="$HOME/.m2/repository"
          ./packaging/build-deb.sh
          ./packaging/build-rpm.sh
          ./packaging/build-dotnet.sh
          ./packaging/build-java.sh
          ./packaging/build-node.sh
          ./packaging/build-python.sh
          ./packaging/build-go.sh
          ./packaging/build-rust.sh
          ./packaging/build-php.sh
          ./packaging/build-ruby.sh
          ./packaging/build-native-libraries.sh
          ./packaging/build-perl.sh
          git archive \
            --format=tar.gz \
            --prefix="sshfling-${SSHFLING_VERSION}/" \
            --output="dist/sshfling-${SSHFLING_VERSION}.tar.gz" \
            HEAD

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.nupkg
            dist/*.jar
            dist/*.pom
            dist/*.tgz
            dist/*.whl
            dist/*.crate
            dist/*.gem
            dist/sshfling-${{ steps.version.outputs.version }}-1.all.rock
            dist/*.tsv
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest
    timeout-minutes: 20
    environment:
      name: release-signing
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Require macOS signing and notarization for release tags
        if: github.ref_type == 'tag'
        env:
          REQUIRE_SIGNING: ${{ vars.SSHFLING_PKG_REQUIRE_SIGNING }}
          REQUIRE_NOTARIZATION: ${{ vars.SSHFLING_PKG_REQUIRE_NOTARIZATION }}
          HAS_SIGN_IDENTITY: ${{ secrets.SSHFLING_PKG_SIGN_IDENTITY != '' }}
          HAS_SIGN_CERT_P12: ${{ secrets.SSHFLING_PKG_SIGN_CERT_P12_BASE64 != '' }}
          HAS_SIGN_CERT_PASSWORD: ${{ secrets.SSHFLING_PKG_SIGN_CERT_PASSWORD != '' }}
          HAS_NOTARY_PROFILE: ${{ secrets.SSHFLING_PKG_NOTARY_PROFILE != '' }}
          HAS_NOTARY_APPLE_ID: ${{ secrets.SSHFLING_PKG_NOTARY_APPLE_ID != '' }}
          HAS_NOTARY_TEAM_ID: ${{ secrets.SSHFLING_PKG_NOTARY_TEAM_ID != '' }}
          HAS_NOTARY_PASSWORD: ${{ secrets.SSHFLING_PKG_NOTARY_PASSWORD != '' }}
        run: |
          set -euo pipefail
          if [[ "$REQUIRE_SIGNING" != "true" || "$HAS_SIGN_IDENTITY" != "true" || "$HAS_SIGN_CERT_P12" != "true" || "$HAS_SIGN_CERT_PASSWORD" != "true" ]]; then
            echo "Release tag macOS packages require SSHFLING_PKG_REQUIRE_SIGNING=true, SSHFLING_PKG_SIGN_IDENTITY, SSHFLING_PKG_SIGN_CERT_P12_BASE64, and SSHFLING_PKG_SIGN_CERT_PASSWORD." >&2
            exit 2
          fi
          if [[ "$REQUIRE_NOTARIZATION" != "true" || "$HAS_NOTARY_PROFILE" != "true" || "$HAS_NOTARY_APPLE_ID" != "true" || "$HAS_NOTARY_TEAM_ID" != "true" || "$HAS_NOTARY_PASSWORD" != "true" ]]; then
            echo "Release tag macOS packages require SSHFLING_PKG_REQUIRE_NOTARIZATION=true, SSHFLING_PKG_NOTARY_PROFILE, SSHFLING_PKG_NOTARY_APPLE_ID, SSHFLING_PKG_NOTARY_TEAM_ID, and SSHFLING_PKG_NOTARY_PASSWORD." >&2
            exit 2
          fi

      - name: Configure macOS signing keychain and notary profile
        if: vars.SSHFLING_PKG_REQUIRE_SIGNING == 'true' || vars.SSHFLING_PKG_REQUIRE_NOTARIZATION == 'true'
        env:
          SSHFLING_PKG_SIGN_CERT_P12_BASE64: ${{ secrets.SSHFLING_PKG_SIGN_CERT_P12_BASE64 }}
          SSHFLING_PKG_SIGN_CERT_PASSWORD: ${{ secrets.SSHFLING_PKG_SIGN_CERT_PASSWORD }}
          SSHFLING_PKG_NOTARY_PROFILE: ${{ secrets.SSHFLING_PKG_NOTARY_PROFILE }}
          SSHFLING_PKG_NOTARY_APPLE_ID: ${{ secrets.SSHFLING_PKG_NOTARY_APPLE_ID }}
          SSHFLING_PKG_NOTARY_TEAM_ID: ${{ secrets.SSHFLING_PKG_NOTARY_TEAM_ID }}
          SSHFLING_PKG_NOTARY_PASSWORD: ${{ secrets.SSHFLING_PKG_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::add-mask::${SSHFLING_PKG_SIGN_CERT_PASSWORD:-}"
          echo "::add-mask::${SSHFLING_PKG_NOTARY_PASSWORD:-}"
          if [[ -n "${SSHFLING_PKG_SIGN_CERT_P12_BASE64:-}" ]]; then
            keychain="$RUNNER_TEMP/sshfling-signing.keychain-db"
            keychain_password="$(uuidgen)"
            cert_path="$RUNNER_TEMP/sshfling-signing.p12"
            trap 'rm -f "$cert_path"' EXIT
            if ! printf '%s' "$SSHFLING_PKG_SIGN_CERT_P12_BASE64" | base64 --decode >"$cert_path" 2>/dev/null; then
              printf '%s' "$SSHFLING_PKG_SIGN_CERT_P12_BASE64" | base64 -D >"$cert_path"
            fi
            login_keychain="$(security login-keychain -d user | tr -d ' "')"
            security create-keychain -p "$keychain_password" "$keychain"
            security set-keychain-settings -lut 21600 "$keychain"
            security unlock-keychain -p "$keychain_password" "$keychain"
            security import "$cert_path" -k "$keychain" -P "$SSHFLING_PKG_SIGN_CERT_PASSWORD" -T /usr/bin/productbuild
            security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
            security list-keychains -d user -s "$keychain" "$login_keychain"
            echo "SSHFLING_PKG_SIGN_KEYCHAIN=$keychain" >>"$GITHUB_ENV"
            echo "SSHFLING_PKG_LOGIN_KEYCHAIN=$login_keychain" >>"$GITHUB_ENV"
          fi
          if [[ -n "${SSHFLING_PKG_NOTARY_PROFILE:-}" && -n "${SSHFLING_PKG_NOTARY_APPLE_ID:-}" ]]; then
            xcrun notarytool store-credentials "$SSHFLING_PKG_NOTARY_PROFILE" \
              --apple-id "$SSHFLING_PKG_NOTARY_APPLE_ID" \
              --team-id "$SSHFLING_PKG_NOTARY_TEAM_ID" \
              --password "$SSHFLING_PKG_NOTARY_PASSWORD"
          fi

      - name: Build macOS package
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
          SSHFLING_PKG_REQUIRE_SIGNING: ${{ vars.SSHFLING_PKG_REQUIRE_SIGNING }}
          SSHFLING_PKG_SIGN_IDENTITY: ${{ secrets.SSHFLING_PKG_SIGN_IDENTITY }}
          SSHFLING_PKG_SIGN_TIMESTAMP: ${{ vars.SSHFLING_PKG_SIGN_TIMESTAMP }}
          SSHFLING_PKG_REQUIRE_NOTARIZATION: ${{ vars.SSHFLING_PKG_REQUIRE_NOTARIZATION }}
          SSHFLING_PKG_NOTARY_PROFILE: ${{ secrets.SSHFLING_PKG_NOTARY_PROFILE }}
        run: ./packaging/build-pkg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-package
          path: dist/*.pkg
          if-no-files-found: error

      - name: Clean up macOS signing keychain
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${SSHFLING_PKG_LOGIN_KEYCHAIN:-}" ]]; then
            security list-keychains -d user -s "$SSHFLING_PKG_LOGIN_KEYCHAIN" || true
          fi
          if [[ -n "${SSHFLING_PKG_SIGN_KEYCHAIN:-}" ]]; then
            security delete-keychain "$SSHFLING_PKG_SIGN_KEYCHAIN" || true
          fi

  windows:
    name: Windows package
    runs-on: windows-latest
    timeout-minutes: 30
    environment:
      name: release-signing
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Require Windows Authenticode for release tags
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          REQUIRE_AUTHENTICODE: ${{ vars.SSHFLING_WINDOWS_REQUIRE_AUTHENTICODE }}
          HAS_SIGN_CERT_SHA1: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_SHA1 != '' }}
          HAS_SIGN_CERT_PFX: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64 != '' }}
          HAS_SIGN_CERT_PASSWORD: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_PASSWORD != '' }}
        run: |
          if ($env:REQUIRE_AUTHENTICODE -ne "true" -or $env:HAS_SIGN_CERT_SHA1 -ne "true" -or $env:HAS_SIGN_CERT_PFX -ne "true" -or $env:HAS_SIGN_CERT_PASSWORD -ne "true") {
            throw "Release tag Windows packages require SSHFLING_WINDOWS_REQUIRE_AUTHENTICODE=true, SSHFLING_WINDOWS_SIGN_CERT_SHA1, SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64, and SSHFLING_WINDOWS_SIGN_CERT_PASSWORD."
          }

      - name: Import Windows signing certificate
        if: vars.SSHFLING_WINDOWS_REQUIRE_AUTHENTICODE == 'true'
        shell: pwsh
        env:
          SSHFLING_WINDOWS_SIGN_CERT_SHA1: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_SHA1 }}
          SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64 }}
          SSHFLING_WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Output "::add-mask::$env:SSHFLING_WINDOWS_SIGN_CERT_PASSWORD"
          if (-not $env:SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64) {
            throw "SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64 is required when Authenticode signing is enabled."
          }
          $pfx = Join-Path $env:RUNNER_TEMP "sshfling-signing.pfx"
          try {
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SSHFLING_WINDOWS_SIGN_CERT_PFX_BASE64))
            $password = ConvertTo-SecureString -String $env:SSHFLING_WINDOWS_SIGN_CERT_PASSWORD -AsPlainText -Force
            $imported = @(Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password)
            $cert = $imported | Where-Object { $_.HasPrivateKey -and $_.Thumbprint -eq $env:SSHFLING_WINDOWS_SIGN_CERT_SHA1 } | Select-Object -First 1
            if (-not $cert) {
              throw "Imported Windows signing certificate did not match SSHFLING_WINDOWS_SIGN_CERT_SHA1."
            }
            "SSHFLING_WINDOWS_IMPORTED_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          }
          finally {
            Remove-Item -Force $pfx -ErrorAction SilentlyContinue
          }

      - name: Build Windows MSI
        shell: pwsh
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
          SSHFLING_WINDOWS_REQUIRE_AUTHENTICODE: ${{ vars.SSHFLING_WINDOWS_REQUIRE_AUTHENTICODE }}
          SSHFLING_WINDOWS_SIGN_CERT_SHA1: ${{ secrets.SSHFLING_WINDOWS_SIGN_CERT_SHA1 }}
          SSHFLING_WINDOWS_SIGN_TIMESTAMP_URL: ${{ vars.SSHFLING_WINDOWS_SIGN_TIMESTAMP_URL }}
        run: powershell -NoProfile -File packaging/build-msi.ps1

      - name: Validate freshly built Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $msi = "dist\sshfling-$version.msi"
          $zip = "dist\sshfling-$version-windows.zip"
          foreach ($path in @($msi, $zip)) {
            if (-not (Test-Path $path) -or (Get-Item $path).Length -le 0) {
              throw "Missing or empty Windows artifact: $path"
            }
          }
          $proc = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @("/i", (Resolve-Path $msi).Path, "/qn", "/norestart")
          if ($proc.ExitCode -notin @(0, 3010, 1641)) {
            throw "msiexec install failed with exit code $($proc.ExitCode)"
          }
          $candidates = @(
            (Join-Path $env:ProgramFiles "SSHFling\sshfling.cmd"),
            (Join-Path ${env:ProgramFiles(x86)} "SSHFling\sshfling.cmd")
          )
          $cmd = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $cmd) {
            throw "Installed sshfling.cmd was not found"
          }
          tests\cross-os\validate-cli.ps1 -CommandPath $cmd -Version $version
          $proc = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @("/x", (Resolve-Path $msi).Path, "/qn", "/norestart")
          if ($proc.ExitCode -notin @(0, 3010, 1605, 1614, 1641)) {
            throw "msiexec uninstall failed with exit code $($proc.ExitCode)"
          }
          $dest = Join-Path $env:TEMP "sshfling-zip-validation"
          Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
          Expand-Archive -Force $zip -DestinationPath $dest
          tests\cross-os\validate-cli.ps1 -CommandPath (Join-Path $dest "sshfling.cmd") -Version $version

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: |
            dist/*.msi
            dist/*.zip
          if-no-files-found: error

      - name: Remove Windows signing certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:SSHFLING_WINDOWS_IMPORTED_CERT_THUMBPRINT) {
            Get-ChildItem Cert:\CurrentUser\My |
              Where-Object { $_.Thumbprint -eq $env:SSHFLING_WINDOWS_IMPORTED_CERT_THUMBPRINT } |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

  package-web:
    name: Verify package web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: release-signing
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      publish: ${{ steps.package_site_mode.outputs.publish }}
    needs:
      - language-catalog
      - linux
      - macos
      - windows
    steps:
      - uses: actions/checkout@v7

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: package-dist
          merge-multiple: true

      - name: Validate package versions and artifact set
        env:
          LINUX_VERSION: ${{ needs.linux.outputs.version }}
          MACOS_VERSION: ${{ needs.macos.outputs.version }}
          WINDOWS_VERSION: ${{ needs.windows.outputs.version }}
        run: |
          set -euo pipefail
          version="$LINUX_VERSION"
          if [[ -z "$version" || "$version" != "$MACOS_VERSION" || "$version" != "$WINDOWS_VERSION" ]]; then
            echo "Package jobs resolved different versions: linux='$LINUX_VERSION' macos='$MACOS_VERSION' windows='$WINDOWS_VERSION'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Package tag '${GITHUB_REF_NAME}' does not match resolved package version '${version}'." >&2
            exit 1
          fi
          python3 tools/validate_promoted_language_evidence.py \
            --version "$version" \
            --functional "package-dist/sshfling-functional-languages-${version}-validation.tsv" \
            --systems "package-dist/sshfling-systems-languages-${version}-validation.tsv"
          mapfile -t catalog_files < <(
            bash packaging/list-language-release-artifacts.sh "$version" catalog
          )
          cd package-dist
          required_files=(
            "sshfling_${version}_all.deb"
            "sshfling-${version}-1.noarch.rpm"
            "sshfling-${version}.tar.gz"
            "SSHFling.Tool.${version}.nupkg"
            "SSHFling.${version}.nupkg"
            "sshfling-cli-${version}.jar"
            "sshfling-cli-${version}-javadoc.jar"
            "sshfling-cli-${version}-sources.jar"
            "sshfling-cli-${version}.pom"
            "sshfling-${version}.tgz"
            "sshfling-${version}-py3-none-any.whl"
            "sshfling-go-${version}.zip"
            "sshfling-cli-${version}.crate"
            "sshfling-php-${version}.zip"
            "sshfling-${version}.gem"
            "sshfling-native-${version}.tar.gz"
            "sshfling-perl-${version}.tar.gz"
            "sshfling-tcl-${version}.tar.gz"
            "sshfling-awk-${version}.tar.gz"
            "sshfling-sed-${version}.tar.gz"
            "sshfling-lua-${version}.tar.gz"
            "sshfling-zsh-${version}.tar.gz"
            "sshfling-fish-${version}.tar.gz"
            "sshfling-elvish-${version}.tar.gz"
            "sshfling-nushell-${version}.tar.gz"
            "sshfling-powershell-${version}.tar.gz"
            "sshfling-guix-scheme-${version}.tar.gz"
            "sshfling-${version}-1.all.rock"
            "sshfling-scripting-languages-${version}-validation.tsv"
            "${catalog_files[@]}"
            "sshfling-${version}.pkg"
            "sshfling-${version}.msi"
            "sshfling-${version}-windows.zip"
          )
          printf '%s\n' "${required_files[@]}" | sort >"$RUNNER_TEMP/package-web-required-files.txt"
          find . -maxdepth 1 -type f -printf '%P\n' | sort >"$RUNNER_TEMP/package-web-actual-files.txt"
          if ! diff -u "$RUNNER_TEMP/package-web-required-files.txt" "$RUNNER_TEMP/package-web-actual-files.txt"; then
            echo "Package web artifact set must exactly match the expected package files." >&2
            exit 1
          fi
          nested_file="$(find . -mindepth 2 -type f -print -quit)"
          if [[ -n "$nested_file" ]]; then
            echo "Package web artifacts must be flattened before publication; found nested file: $nested_file" >&2
            exit 1
          fi
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Package web artifact is missing or empty: $file" >&2
              exit 1
            fi
          done

      - name: Resolve package site publishing mode
        id: package_site_mode
        env:
          HAS_REPO_GPG_PRIVATE_KEY: ${{ secrets.SSHFLING_REPO_GPG_PRIVATE_KEY != '' }}
          HAS_REPO_GPG_FINGERPRINT: ${{ secrets.SSHFLING_REPO_GPG_FINGERPRINT != '' }}
          GENERATE_TEST_SIGNING_KEY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.generate_test_signing_key == 'true' }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          requested_publish=false
          if [[ "$EVENT_NAME" == "push" ]]; then
            requested_publish=true
          elif [[ "$INPUT_PUBLISH" == "true" ]]; then
            requested_publish=true
          fi

          publish=false
          require_repo_signatures=false
          if [[ "$requested_publish" == "true" && "$REF_TYPE" != "tag" ]]; then
            echo "Package site publishing is only allowed from a protected version tag." >&2
            exit 2
          fi
          if [[ "$requested_publish" == "true" && "$HAS_REPO_GPG_PRIVATE_KEY" == "true" && "$HAS_REPO_GPG_FINGERPRINT" == "true" ]]; then
            publish=true
            require_repo_signatures=true
          elif [[ "$requested_publish" == "true" && "$EVENT_NAME" == "push" ]]; then
            echo "Tag-based package site publishing requires SSHFLING_REPO_GPG_PRIVATE_KEY and SSHFLING_REPO_GPG_FINGERPRINT." >&2
            exit 2
          elif [[ "$requested_publish" == "true" && "$EVENT_NAME" == "workflow_dispatch" && "$HAS_REPO_GPG_PRIVATE_KEY" != "true" ]]; then
            echo "Package site publishing requires SSHFLING_REPO_GPG_PRIVATE_KEY for stable repository signing." >&2
            exit 2
          fi
          if [[ "$requested_publish" == "true" && "$EVENT_NAME" == "workflow_dispatch" && "$HAS_REPO_GPG_FINGERPRINT" != "true" ]]; then
            echo "Package site publishing requires SSHFLING_REPO_GPG_FINGERPRINT as the approved public trust anchor." >&2
            exit 2
          fi
          if [[ "$publish" == "true" && "$GENERATE_TEST_SIGNING_KEY" == "true" ]]; then
            echo "Ephemeral repository signing keys are not allowed for package site publishing." >&2
            exit 2
          fi
          echo "publish=$publish" >>"$GITHUB_OUTPUT"
          echo "require_repo_signatures=$require_repo_signatures" >>"$GITHUB_OUTPUT"
          echo "generate_test_signing_key=$GENERATE_TEST_SIGNING_KEY" >>"$GITHUB_OUTPUT"

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev createrepo-c gnupg openssl rpm

      - name: Build public package site
        env:
          VERSION: ${{ needs.linux.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          SSHFLING_REPO_GPG_PRIVATE_KEY: ${{ secrets.SSHFLING_REPO_GPG_PRIVATE_KEY }}
          SSHFLING_REPO_GPG_KEY_ID: ${{ secrets.SSHFLING_REPO_GPG_KEY_ID }}
          SSHFLING_REPO_GPG_FINGERPRINT: ${{ secrets.SSHFLING_REPO_GPG_FINGERPRINT }}
          SSHFLING_REPO_GPG_PASSPHRASE: ${{ secrets.SSHFLING_REPO_GPG_PASSPHRASE }}
          SSHFLING_GENERATE_REPO_SIGNING_KEY: ${{ steps.package_site_mode.outputs.generate_test_signing_key == 'true' && '1' || '' }}
          REQUIRE_REPO_SIGNATURES: ${{ steps.package_site_mode.outputs.require_repo_signatures }}
        run: |
          bash packaging/build-public-web.sh package-dist public
          bash packaging/verify-public-web.sh public

      - name: Write package site evidence
        run: |
          set -euo pipefail
          {
            echo "# SSHFling package site evidence"
            echo
            echo "Version: ${{ needs.linux.outputs.version }}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "PowerShell, Nushell, and Guix Scheme source archives are runtime-gated; their publication does not assert runtime PASS. Per-check status is recorded in sshfling-scripting-languages-${{ needs.linux.outputs.version }}-validation.tsv."
            if [[ -f public/sshfling-repo-fingerprint.txt ]]; then
              echo "Repository signing fingerprint: \`$(tr -d '[:space:]' < public/sshfling-repo-fingerprint.txt)\`"
            fi
            echo
            echo "| Download | Bytes | SHA-256 |"
            echo "| --- | ---: | --- |"
            while IFS= read -r -d '' file; do
              name="${file#public/downloads/}"
              bytes="$(wc -c <"$file" | tr -d '[:space:]')"
              hash="$(sha256sum "$file" | awk '{print $1}')"
              printf "| \`%s\` | %s | \`%s\` |\n" "$name" "$bytes" "$hash"
            done < <(find public/downloads -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z)
          } > public/RELEASE-EVIDENCE.md
          cat public/RELEASE-EVIDENCE.md >>"$GITHUB_STEP_SUMMARY"

      - name: Generate and validate release security evidence
        env:
          VERSION: ${{ needs.linux.outputs.version }}
          RELEASE_SECURITY_RUN_OPTIONAL_TOOLS: "1"
          RELEASE_SECURITY_STRICT_OPTIONAL_TOOLS: ${{ steps.package_site_mode.outputs.publish == 'true' && '1' || '' }}
          RELEASE_MATRIX_VALIDATE_FLAGS: ${{ steps.package_site_mode.outputs.publish == 'true' && '--require-pass' || '' }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_SECURITY_STRICT_OPTIONAL_TOOLS:-}" = "1" ]]; then
            tools/provision-release-scanners.sh
          fi
          make release-security-scan VERSION="${VERSION}"
          make release-security-evidence-validate RELEASE_MATRIX_VALIDATE_FLAGS="${RELEASE_MATRIX_VALIDATE_FLAGS}"

      - name: Generate and validate package site evidence gate
        env:
          REQUIRE_REPO_SIGNATURES: ${{ steps.package_site_mode.outputs.require_repo_signatures }}
        run: |
          set -euo pipefail
          python3 tools/generate_release_evidence.py \
            --mode package-site \
            --public-dir public \
            --version "${{ needs.linux.outputs.version }}" \
            --owner "${{ github.repository_owner }}" \
            --source-commit "$GITHUB_SHA"
          make release-matrix-validate \
            RELEASE_MATRIX=docs/release/enterprise-release-evidence/generated/package-site-matrix.csv \
            RELEASE_MANIFEST=docs/release/enterprise-release-evidence/generated/package-site-manifest.json \
            RELEASE_MATRIX_VALIDATE_FLAGS=--require-pass

      - name: Upload package site release evidence
        uses: actions/upload-artifact@v7
        with:
          name: package-site-release-evidence
          path: |
            docs/release/enterprise-release-evidence/security-scans
            docs/release/enterprise-release-evidence/generated
          if-no-files-found: error

      - name: Write package site attestation subjects
        run: |
          set -euo pipefail
          find public -type f -print0 | sort -z | xargs -0 sha256sum >"$RUNNER_TEMP/package-site-subjects.sha256"

      - name: Attest package site provenance
        if: steps.package_site_mode.outputs.publish == 'true'
        uses: actions/attest@v4
        with:
          subject-checksums: ${{ runner.temp }}/package-site-subjects.sha256

      - name: Upload verified package web artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-package-web
          path: public
          if-no-files-found: error
          include-hidden-files: true

  deploy-pages:
    name: Deploy package web
    if: needs.package-web.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    needs:
      - linux
      - package-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download verified package web artifact
        uses: actions/download-artifact@v8
        with:
          name: public-package-web
          path: public

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed package site
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          VERSION: ${{ needs.linux.outputs.version }}
        run: |
          set -euo pipefail
          base_url="${PAGE_URL%/}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          fetch() {
            local path="$1"
            local output="$2"
            local url="${base_url}/${path}"
            local _attempt
            for _attempt in {1..12}; do
              if curl -fsSL "$url" -o "$output"; then
                return 0
              fi
              sleep 10
            done
            curl -fsSL "$url" -o "$output"
          }

          fetch index.html "$tmp/index.html"
          fetch install.sh "$tmp/install.sh"
          fetch sshfling-repo.asc "$tmp/sshfling-repo.asc"
          fetch sshfling-repo-fingerprint.txt "$tmp/sshfling-repo-fingerprint.txt"
          fetch apt/Release "$tmp/Release"
          fetch apt/InRelease "$tmp/InRelease"
          fetch apt/Release.gpg "$tmp/Release.gpg"
          fetch rpm/repodata/repomd.xml "$tmp/repomd.xml"
          fetch rpm/repodata/repomd.xml.asc "$tmp/repomd.xml.asc"
          fetch downloads/SHA256SUMS "$tmp/downloads-SHA256SUMS"

          : >"$tmp/deployed-SHA256SUMS"
          while read -r expected_hash file; do
            if [[ ! "$expected_hash" =~ ^[0-9a-f]{64}$ || ! "$file" =~ ^[A-Za-z0-9._+-]+$ ]]; then
              echo "Invalid deployed download checksum row: $expected_hash $file" >&2
              exit 1
            fi
            fetch "downloads/$file" "$tmp/$file"
            printf '%s  %s\n' "$expected_hash" "$file" >>"$tmp/deployed-SHA256SUMS"
          done <"$tmp/downloads-SHA256SUMS"
          test -s "$tmp/deployed-SHA256SUMS"
          (cd "$tmp" && sha256sum -c deployed-SHA256SUMS)

          expected_fingerprint="$(tr -d '[:space:]' < "$tmp/sshfling-repo-fingerprint.txt" | tr '[:lower:]' '[:upper:]')"
          actual_fingerprint="$(gpg --batch --show-keys --with-colons "$tmp/sshfling-repo.asc" | awk -F: '/^fpr:/ {print toupper($10); exit}')"
          test -n "$expected_fingerprint"
          test "$actual_fingerprint" = "$expected_fingerprint"
          gpg_home="$tmp/gnupg"
          install -d -m 0700 "$gpg_home"
          GNUPGHOME="$gpg_home" gpg --batch --import "$tmp/sshfling-repo.asc"
          GNUPGHOME="$gpg_home" gpg --batch --verify "$tmp/InRelease"
          GNUPGHOME="$gpg_home" gpg --batch --verify "$tmp/Release.gpg" "$tmp/Release"
          GNUPGHOME="$gpg_home" gpg --batch --verify "$tmp/repomd.xml.asc" "$tmp/repomd.xml"

          grep -Fq "SSHFling ${VERSION} packages" "$tmp/index.html"
          grep -Fq "signed-by=/usr/share/keyrings/sshfling-repo.gpg" "$tmp/index.html"
          grep -Fq "repo_gpgcheck=1" "$tmp/index.html"
          grep -Fq "signed-by=/usr/share/keyrings/sshfling-repo.gpg" "$tmp/install.sh"
          grep -Fq "repo_gpgcheck=1" "$tmp/install.sh"
          grep -Fq "sshfling-${VERSION}.tar.gz" "$tmp/downloads-SHA256SUMS"
          grep -Fq "sshfling-scripting-languages-${VERSION}-validation.tsv" "$tmp/index.html"
          grep -Fq "sshfling-functional-languages-${VERSION}-validation.tsv" "$tmp/index.html"
          grep -Fq "sshfling-systems-languages-${VERSION}-validation.tsv" "$tmp/index.html"
          grep -Fq "Runtime-gated: Nushell" "$tmp/index.html"
          grep -Fq "Runtime-gated: PowerShell" "$tmp/index.html"
          grep -Fq "Runtime-gated: Guix Scheme" "$tmp/index.html"
          forbidden_apt="trusted=""yes"
          forbidden_rpm="gpgcheck=""0"
          ! grep -R -I -F -e "$forbidden_apt" -e "$forbidden_rpm" "$tmp"
