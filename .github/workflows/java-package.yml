name: Java package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Java package version. Defaults to the tag name or bin/sshfling VERSION."
        required: false
        type: string
      publish:
        description: "Deploy the Java Maven package to GitHub Packages."
        required: false
        default: false
        type: boolean
      verify_published:
        description: "Verify the Java Maven package can be downloaded from GitHub Packages without redeploying it."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: java-package-${{ github.ref }}-${{ inputs.version || 'source' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test Java package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            packaging/java/pom.xml
            packaging/java/consumers/*/pom.xml
            packaging/java/consumers/*/build.gradle.kts

      - name: Build and validate Maven and Gradle package
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: SSHFLING_MAVEN_REPO_LOCAL="$HOME/.m2/repository" make package-java VERSION="${SSHFLING_VERSION}"

      - name: Upload Java package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: java-package
          path: |
            dist/sshfling-cli-${{ steps.version.outputs.version }}.jar
            dist/sshfling-cli-${{ steps.version.outputs.version }}-javadoc.jar
            dist/sshfling-cli-${{ steps.version.outputs.version }}-sources.jar
            dist/sshfling-cli-${{ steps.version.outputs.version }}.pom
          if-no-files-found: error

  publish:
    name: Deploy Java package to GitHub Packages
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-packages
    permissions:
      contents: read
      packages: write
    needs:
      - build
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            packaging/java/pom.xml
            packaging/java/consumers/*/pom.xml
            packaging/java/consumers/*/build.gradle.kts

      - name: Deploy Maven package
        env:
          SSHFLING_VERSION: ${{ needs.build.outputs.version }}
          SSHFLING_JAVA_DEPLOY: "1"
          SSHFLING_JAVA_REGISTRY_URL: https://maven.pkg.github.com/${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: SSHFLING_MAVEN_REPO_LOCAL="$HOME/.m2/repository" ./packaging/build-java.sh

  verify-published:
    name: Verify published Java package
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (
        (github.ref_type == 'tag' && needs.publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' && needs.publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.verify_published == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    needs:
      - build
      - publish
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download and validate published Maven package
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
          REGISTRY_URL: https://maven.pkg.github.com/${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          verify_dir="$RUNNER_TEMP/sshfling-java-verify"
          maven_repo="$verify_dir/m2"
          settings_file="$verify_dir/settings.xml"
          install -d "$verify_dir" "$maven_repo"
          cat >"$settings_file" <<SETTINGS
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          chmod 0600 "$settings_file"

          mvn -B -s "$settings_file" -Dmaven.repo.local="$maven_repo" \
            dependency:get \
            -Dartifact="io.sshfling:sshfling-cli:${VERSION}" \
            -DremoteRepositories="github::default::${REGISTRY_URL}" \
            -Dtransitive=false
          mvn -B -s "$settings_file" -Dmaven.repo.local="$maven_repo" \
            dependency:get \
            -Dartifact="io.sshfling:sshfling-cli:${VERSION}:jar:sources" \
            -DremoteRepositories="github::default::${REGISTRY_URL}" \
            -Dtransitive=false
          mvn -B -s "$settings_file" -Dmaven.repo.local="$maven_repo" \
            dependency:get \
            -Dartifact="io.sshfling:sshfling-cli:${VERSION}:jar:javadoc" \
            -DremoteRepositories="github::default::${REGISTRY_URL}" \
            -Dtransitive=false

          artifact_dir="$maven_repo/io/sshfling/sshfling-cli/$VERSION"
          test -f "$artifact_dir/sshfling-cli-$VERSION.jar"
          test -f "$artifact_dir/sshfling-cli-$VERSION-javadoc.jar"
          test -f "$artifact_dir/sshfling-cli-$VERSION-sources.jar"
          test -f "$artifact_dir/sshfling-cli-$VERSION.pom"
          java -jar "$artifact_dir/sshfling-cli-$VERSION.jar" --version | grep -Fx "sshfling $VERSION"

          cp -R packaging/java/consumers/maven "$verify_dir/maven-consumer"
          mvn -B -f "$verify_dir/maven-consumer/pom.xml" \
            -Dmaven.repo.local="$maven_repo" \
            -Dsshfling.version="$VERSION" package
          java -cp "$verify_dir/maven-consumer/target/classes:$artifact_dir/sshfling-cli-$VERSION.jar" \
            io.sshfling.validation.MavenConsumer --version | grep -Fx "sshfling $VERSION"

          cp -R packaging/java/consumers/gradle "$verify_dir/gradle-consumer"
          packaging/java/gradlew --no-daemon --console=plain \
            -p "$verify_dir/gradle-consumer" \
            -PsshflingVersion="$VERSION" \
            -PsshflingRepository="$maven_repo" \
            run --args=--version | grep -Fx "sshfling $VERSION"
