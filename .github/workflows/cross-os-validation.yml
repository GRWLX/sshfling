name: Cross OS validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to cross-validate."
        required: true
        default: "0.1.11"
        type: string

permissions:
  contents: read

jobs:
  linux-public-repos:
    name: Linux public repo runtime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            image: debian:bookworm-slim
            command: |
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends ca-certificates curl >/dev/null
              echo "deb [trusted=yes] https://grwlx.github.io/sshfling/apt ./" >/etc/apt/sources.list.d/sshfling.list
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends sshfling >/dev/null
          - name: ubuntu
            image: ubuntu:24.04
            command: |
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl >/dev/null
              echo "deb [trusted=yes] https://grwlx.github.io/sshfling/apt ./" >/etc/apt/sources.list.d/sshfling.list
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends sshfling >/dev/null
          - name: fedora
            image: fedora:latest
            command: |
              printf "%s\n" "[sshfling]" "name=SSHFling" "baseurl=https://grwlx.github.io/sshfling/rpm" "enabled=1" "gpgcheck=0" >/etc/yum.repos.d/sshfling.repo
              dnf install -y sshfling >/dev/null
          - name: rocky
            image: rockylinux:9
            command: |
              printf "%s\n" "[sshfling]" "name=SSHFling" "baseurl=https://grwlx.github.io/sshfling/rpm" "enabled=1" "gpgcheck=0" >/etc/yum.repos.d/sshfling.repo
              dnf install -y sshfling >/dev/null
          - name: alma
            image: almalinux:9
            command: |
              printf "%s\n" "[sshfling]" "name=SSHFling" "baseurl=https://grwlx.github.io/sshfling/rpm" "enabled=1" "gpgcheck=0" >/etc/yum.repos.d/sshfling.repo
              dnf install -y sshfling >/dev/null
          - name: ubi
            image: registry.access.redhat.com/ubi9/ubi
            command: |
              printf "%s\n" "[sshfling]" "name=SSHFling" "baseurl=https://grwlx.github.io/sshfling/rpm" "enabled=1" "gpgcheck=0" >/etc/yum.repos.d/sshfling.repo
              dnf install -y sshfling >/dev/null
    steps:
      - uses: actions/checkout@v5

      - name: Validate ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" "${{ matrix.image }}" bash -lc 'set -euo pipefail
          ${{ matrix.command }}
          /tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"'

  linux-community-builds:
    name: Linux community runtime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arch
            image: archlinux:latest
            command: |
              pacman -Sy --noconfirm --needed base-devel curl sudo >/dev/null
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >/etc/sudoers.d/builder
              install -d -o builder -g builder /build
              cd /build
              sudo -u builder curl -fsSLO https://grwlx.github.io/sshfling/arch/PKGBUILD
              sudo -u builder makepkg -si --noconfirm --needed >/dev/null
          - name: alpine
            image: alpine:3.20
            command: |
              apk add --no-cache alpine-sdk curl python3 openssh-client shadow procps util-linux >/dev/null
              adduser -D builder
              addgroup builder abuild
              install -d -o builder -g builder /build
              cd /build
              su builder -c "curl -fsSLO https://grwlx.github.io/sshfling/alpine/APKBUILD"
              su builder -c "abuild-keygen -a -n"
              cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/
              chown -R builder:builder /build
              su builder -c "cd /build && abuild checksum && abuild -r" >/tmp/alpine-build.log
              apk_file="$(find /home/builder/packages -name "sshfling-${{ inputs.version }}-r0.apk" -print -quit)"
              test -n "$apk_file"
              apk add --allow-untrusted "$apk_file" >/dev/null
    steps:
      - uses: actions/checkout@v5

      - name: Validate ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" "${{ matrix.image }}" sh -lc 'set -eu
          ${{ matrix.command }}
          /tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"'

  opensuse-spec:
    name: openSUSE OBS runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Build, install, and validate generated openSUSE spec
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" opensuse/tumbleweed bash -lc 'set -euo pipefail
          zypper --non-interactive --gpg-auto-import-keys --no-gpg-checks refresh >/dev/null
          zypper --non-interactive --gpg-auto-import-keys --no-gpg-checks install rpm-build curl tar gzip python3 openssh shadow procps util-linux >/dev/null
          mkdir -p /root/rpmbuild/SOURCES /root/rpmbuild/SPECS
          curl -fsSL https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz -o /root/rpmbuild/SOURCES/sshfling-${{ inputs.version }}.tar.gz
          curl -fsSL https://grwlx.github.io/sshfling/opensuse/sshfling.spec -o /root/rpmbuild/SPECS/sshfling.spec
          rpmbuild --define "_topdir /root/rpmbuild" -ba /root/rpmbuild/SPECS/sshfling.spec >/tmp/opensuse-rpmbuild.log
          zypper --non-interactive --gpg-auto-import-keys --no-gpg-checks install /root/rpmbuild/RPMS/noarch/sshfling-${{ inputs.version }}-1.noarch.rpm >/dev/null
          /tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"'

  nix-flake:
    name: Nix flake runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and validate generated Nix flake
        run: |
          set -euo pipefail
          mkdir -p nix-test
          curl -fsSL https://grwlx.github.io/sshfling/nix/flake.nix -o nix-test/flake.nix
          docker run --rm -v "$PWD/nix-test:/work" -v "$PWD/tests/cross-os:/tests/cross-os:ro" nixos/nix:2.24.9 sh -lc 'set -eu
          cd /work
          NIXPKGS_ALLOW_UNFREE=1 nix --extra-experimental-features "nix-command flakes" build --impure .#default -o result
          nix --extra-experimental-features "nix-command flakes" shell nixpkgs#python3 -c /tests/cross-os/validate-cli.sh ./result/bin/sshfling "${{ inputs.version }}"'

  slackware-slackbuild:
    name: Slackware SlackBuild runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build, install, and validate generated SlackBuild
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" vbatts/slackware:15.0 /bin/sh -lc 'set -eu
          wget --no-check-certificate -qO /tmp/python3.txz https://mirrors.slackware.com/slackware/slackware64-15.0/slackware64/d/python3-3.9.10-x86_64-1.txz
          installpkg /tmp/python3.txz >/tmp/install-python3.log
          mkdir -p /tmp/slacktest
          cd /tmp/slacktest
          wget --no-check-certificate -qO sshfling.SlackBuild https://grwlx.github.io/sshfling/slackware/sshfling.SlackBuild
          wget --no-check-certificate -qO slack-desc https://grwlx.github.io/sshfling/slackware/slack-desc
          wget --no-check-certificate -qO sshfling-${{ inputs.version }}.tar.gz https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz
          chmod +x sshfling.SlackBuild
          ./sshfling.SlackBuild >/tmp/slackbuild.log
          installpkg /tmp/sshfling-${{ inputs.version }}-noarch-1_SBo.txz >/tmp/installpkg.log
          /tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"'

  void-template:
    name: Void xbps-src runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Build, install, and validate generated Void template
        run: |
          set -euo pipefail
          docker run --rm --privileged -v /dev:/dev -v "$PWD/tests/cross-os:/tests/cross-os:ro" ghcr.io/void-linux/void-glibc-full:latest sh -lc 'set -eu
          xbps-install -Syu -y xbps >/dev/null || true
          xbps-install -Syu -y git curl base-devel python3 openssh bash sudo >/dev/null
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >/etc/sudoers.d/builder
          git clone --depth 1 https://github.com/void-linux/void-packages.git /void-packages >/dev/null
          mkdir -p /void-packages/srcpkgs/sshfling
          curl -fsSL https://grwlx.github.io/sshfling/void/template -o /void-packages/srcpkgs/sshfling/template
          chown -R builder:builder /void-packages
          sudo -Eu builder sh -lc "cd /void-packages && common/travis/prepare.sh >/tmp/void-bootstrap.log && ./xbps-src pkg sshfling >/tmp/void-build.log" || {
            cat /tmp/void-bootstrap.log || true
            cat /tmp/void-build.log || true
            exit 1
          }
          xbps-install -y --repository=/void-packages/hostdir/binpkgs sshfling >/dev/null
          /tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"'

  freebsd-source-layout:
    name: FreeBSD source layout runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          prepare: |
            pkg install -y curl python3 openssh-portable
          run: |
            set -eu
            workspace="$(pwd)"
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz
            tar -xzf sshfling-${{ inputs.version }}.tar.gz
            src="$tmp/sshfling-${{ inputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/local/bin/sshfling
            mkdir -p /usr/local/share/sshfling/templates
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/local/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/local/bin/sshfling "${{ inputs.version }}"

  openbsd-source-layout:
    name: OpenBSD source layout runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/openbsd-vm@v1
        with:
          release: "7.9"
          usesh: true
          prepare: |
            pkg_add curl python%3
          run: |
            set -eu
            workspace="$(pwd)"
            export PATH="/usr/local/bin:$PATH"
            if ! command -v python3 >/dev/null 2>&1; then
              py="$(ls /usr/local/bin/python3.* | head -n 1)"
              ln -sf "$py" /usr/local/bin/python3
            fi
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz
            tar -xzf sshfling-${{ inputs.version }}.tar.gz
            src="$tmp/sshfling-${{ inputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/local/bin/sshfling
            mkdir -p /usr/local/share/sshfling/templates
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/local/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/local/bin/sshfling "${{ inputs.version }}"

  netbsd-source-layout:
    name: NetBSD source layout runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/netbsd-vm@v1
        with:
          release: "10.1"
          usesh: true
          prepare: |
            export PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/x86_64/10.1/All"
            if ! command -v curl >/dev/null 2>&1; then
              /usr/sbin/pkg_add curl
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              /usr/sbin/pkg_add python313 || /usr/sbin/pkg_add python312 || /usr/sbin/pkg_add python311
            fi
          run: |
            set -eu
            workspace="$(pwd)"
            export PATH="/usr/pkg/bin:$PATH"
            if ! command -v python3 >/dev/null 2>&1; then
              py="$(ls /usr/pkg/bin/python3.* | head -n 1)"
              ln -sf "$py" /usr/pkg/bin/python3
            fi
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz
            tar -xzf sshfling-${{ inputs.version }}.tar.gz
            src="$tmp/sshfling-${{ inputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/pkg/bin/sshfling
            mkdir -p /usr/pkg/share/sshfling/templates
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/pkg/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/pkg/bin/sshfling "${{ inputs.version }}"

  firewall-freebsd-family:
    name: Firewall OS FreeBSD runtime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pfsense-plus-22-ce-2.6-opnsense-12x-nearest-freebsd-12.4
            release: "12.4"
          - name: opnsense-23.x-24.1-freebsd-13.2
            release: "13.2"
          - name: freebsd-13.3-firewall-continuity
            release: "13.3"
          - name: freebsd-13.4-firewall-continuity
            release: "13.4"
          - name: freebsd-13.5-firewall-continuity
            release: "13.5"
          - name: pfsense-ce-2.7-plus-23-freebsd-14.0
            release: "14.0"
          - name: opnsense-24.7-business-24.10-freebsd-14.1
            release: "14.1"
          - name: opnsense-25.1-freebsd-14.2
            release: "14.2"
          - name: opnsense-25.7-26.1-freebsd-14.3
            release: "14.3"
          - name: freebsd-14.4-firewall-continuity
            release: "14.4"
          - name: pfsense-ce-2.8-plus-24-25.07-freebsd-15.0
            release: "15.0"
          - name: opnsense-26.7-tracking-freebsd-15.1
            release: "15.1"
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          prepare: |
            set -eu
            export ASSUME_ALWAYS_YES=yes
            export IGNORE_OSVERSION=yes
            if freebsd-version | grep -q "^12[.]"; then
              archive="https://pkg.opnsense.org/FreeBSD:12:amd64/snapshots/latest"
              export PACKAGESITE="$archive"
              mkdir -p /usr/local/etc/pkg/repos
              printf "%s\n" "FreeBSD: { enabled: no }" >/usr/local/etc/pkg/repos/FreeBSD.conf
              {
                printf "%s\n" "OPNsenseArchive: {"
                printf "%s\n" "  url: \"https://pkg.opnsense.org/FreeBSD:12:amd64/snapshots/latest\","
                printf "%s\n" "  signature_type: \"none\","
                printf "%s\n" "  enabled: yes"
                printf "%s\n" "}"
              } >/usr/local/etc/pkg/repos/OPNsenseArchive.conf
              if ! pkg bootstrap -f; then
                fetch -o /tmp/pkg.txz "$archive/Latest/pkg.txz"
                tar -C / -xpf /tmp/pkg.txz
              fi
              pkg update -f
              pkg install -y curl python38
              ln -sf /usr/local/bin/python3.8 /usr/local/bin/python3
            else
              pkg update -f || true
              if ! pkg install -y curl python3; then
                pkg install -y curl python39
              fi
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              for py in /usr/local/bin/python3.12 /usr/local/bin/python3.11 /usr/local/bin/python3.10 /usr/local/bin/python3.9; do
                if [ -x "$py" ]; then
                  ln -sf "$py" /usr/local/bin/python3
                  break
                fi
              done
            fi
            python3 --version
          run: |
            set -eu
            workspace="$(pwd)"
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.tar.gz
            tar -xzf sshfling-${{ inputs.version }}.tar.gz
            src="$tmp/sshfling-${{ inputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/local/bin/sshfling
            mkdir -p /usr/local/share/sshfling/templates
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/local/share/sshfling/templates/
            "$workspace/tests/firewall-os/validate-freebsd-firewall.sh" /usr/local/bin/sshfling "${{ inputs.version }}" "${{ matrix.name }}"

  macos-pkg:
    name: macOS pkg runtime
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install and validate published pkg
        run: |
          set -euo pipefail
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-${{ inputs.version }}.pkg" -o /tmp/sshfling.pkg
          sudo installer -pkg /tmp/sshfling.pkg -target /
          tests/cross-os/validate-cli.sh /usr/local/bin/sshfling "${{ inputs.version }}"

  macos-homebrew:
    name: Homebrew formula runtime
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install and validate published formula
        run: |
          set -euo pipefail
          curl -fsSL https://grwlx.github.io/sshfling/homebrew/sshfling.rb -o /tmp/sshfling.rb
          brew tap-new grwlx/sshfling-cross-test
          tap_dir="$(brew --repository grwlx/sshfling-cross-test)"
          mkdir -p "$tap_dir/Formula"
          cp /tmp/sshfling.rb "$tap_dir/Formula/sshfling.rb"
          brew install grwlx/sshfling-cross-test/sshfling
          tests/cross-os/validate-cli.sh sshfling "${{ inputs.version }}"

  windows-msi:
    name: Windows MSI runtime
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install and validate published MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ inputs.version }}"
          $msi = Join-Path $env:TEMP "sshfling-$version.msi"
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/sshfling-$version.msi?run=${{ github.run_id }}" -OutFile $msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i", $msi, "/qn", "/norestart"
          $candidates = @(
            (Join-Path $env:ProgramFiles "SSHFling\sshfling.cmd"),
            (Join-Path ${env:ProgramFiles(x86)} "SSHFling\sshfling.cmd")
          )
          $cmd = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $cmd) {
            Get-ChildItem -Path $env:ProgramFiles, ${env:ProgramFiles(x86)} -Filter sshfling.cmd -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "Installed sshfling.cmd was not found"
          }
          tests\cross-os\validate-cli.ps1 -CommandPath $cmd -Version $version

  windows-zip:
    name: Windows zip runtime
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Download and validate published Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ inputs.version }}"
          $zip = Join-Path $env:TEMP "sshfling-$version-windows.zip"
          $dest = Join-Path $env:TEMP "sshfling-zip"
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/sshfling-$version-windows.zip?run=${{ github.run_id }}" -OutFile $zip
          Expand-Archive -Force $zip -DestinationPath $dest
          $cmd = Join-Path $dest "sshfling.cmd"
          tests\cross-os\validate-cli.ps1 -CommandPath $cmd -Version $version

  community-manifest-sanity:
    name: Community manifest template sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate and inspect community manifests
        run: |
          set -euo pipefail
          mkdir -p package-dist public/downloads
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=build \
            --exclude=dist \
            --exclude=package-dist \
            --exclude=public \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --transform "s,^\.,sshfling-${{ inputs.version }}," \
            -czf "public/downloads/sshfling-${{ inputs.version }}.tar.gz" \
            .
          bash packaging/build-community-manifests.sh package-dist public https://grwlx.github.io/sshfling "${{ inputs.version }}" GRWLX/sshfling
          grep -Fq "share/sshfling/templates/compose.server.yml" public/freebsd/security/sshfling/pkg-plist
          grep -Fq "share/sshfling/templates/compose.server.yml" public/openbsd/security/sshfling/pkg/PLIST
          grep -Fq "share/sshfling/templates/compose.server.yml" public/pkgsrc/security/sshfling/PLIST
          grep -Fq '("compose.server.yml" "share/sshfling/templates/compose.server.yml")' public/guix/sshfling.scm
          grep -Fq "cp -a .env.example LICENSE README.md compose.server.yml compose.client.yml scripts secrets ssh-client ssh-server production systemd" public/opensuse/sshfling.spec
          grep -Fq "SSHFLING_TEMPLATE_DIR" public/snap/snapcraft.yaml
          grep -Fq "share/sshfling/templates" public/termux/packages/sshfling/build.sh
          grep -Fq "usr/share/sshfling/templates" public/appimage/AppImageBuilder.yml
          grep -Fq "doins -r scripts secrets ssh-client ssh-server production systemd" public/gentoo/app-admin/sshfling/sshfling-${{ inputs.version }}.ebuild
