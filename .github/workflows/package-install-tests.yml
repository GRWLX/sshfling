name: Package install tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to install-test. Defaults to bin/sshfling VERSION."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: package-install-tests-${{ github.ref }}-${{ inputs.version || 'source' }}
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve requested version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

  scripting-language-packages:
    name: Scripting language packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Install language runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fish guile-3.0 guix liblua5.1-0-dev liblua5.4-dev lua5.1 lua5.4 \
            luarocks mawk sed tcl zsh

      - name: Build and validate scripting language packages
        env:
          SSHFLING_VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          set -euo pipefail
          GOBIN="$RUNNER_TEMP/sshfling-language-bin" go install src.elv.sh/cmd/elvish@v0.21.0
          nu_version=0.113.1
          nu_archive="nu-$nu_version-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/$nu_archive" \
            "https://github.com/nushell/nushell/releases/download/$nu_version/$nu_archive"
          curl -fsSL -o "$RUNNER_TEMP/nu-SHA256SUMS" \
            "https://github.com/nushell/nushell/releases/download/$nu_version/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "$nu_archive\$" nu-SHA256SUMS | sha256sum -c -
            tar -xzf "$nu_archive" --wildcards '*/nu'
          )
          install -m 0755 "$(find "$RUNNER_TEMP" -type f -path '*/nu' -print -quit)" \
            "$RUNNER_TEMP/sshfling-language-bin/nu"
          pwsh_version=7.6.2
          pwsh_archive="powershell-$pwsh_version-linux-x64.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/$pwsh_archive" \
            "https://github.com/PowerShell/PowerShell/releases/download/v$pwsh_version/$pwsh_archive"
          printf '%s  %s\n' \
            6cbcfbf20e376aa62ffd91c973493c41a7a52ddfd5a5db3ff9bc12f0d0fe9292 \
            "$RUNNER_TEMP/$pwsh_archive" | sha256sum -c -
          install -d "$RUNNER_TEMP/powershell"
          tar -xzf "$RUNNER_TEMP/$pwsh_archive" -C "$RUNNER_TEMP/powershell"
          chmod 0755 "$RUNNER_TEMP/powershell/pwsh"
          ln -s "$RUNNER_TEMP/powershell/pwsh" "$RUNNER_TEMP/sshfling-language-bin/pwsh"
          export PATH="$RUNNER_TEMP/sshfling-language-bin:$PATH"
          sudo rm -f /var/guix/daemon-socket/socket
          sudo install -d -m 0755 /var/guix/daemon-socket /gnu/store
          sudo setsid guix-daemon \
            --build-users-group=_guixbuild \
            --listen=/var/guix/daemon-socket/socket \
            >/tmp/sshfling-guix-daemon.log 2>&1 </dev/null &
          for _ in $(seq 1 10); do
            test -S /var/guix/daemon-socket/socket && break
            sleep 1
          done
          test -S /var/guix/daemon-socket/socket
          bash packaging/build-scripting-languages.sh
          evidence="dist/sshfling-scripting-languages-$SSHFLING_VERSION-validation.tsv"
          test -s "$evidence"
          ! grep -F $'\tFAIL\t' "$evidence"
          for expected in \
            $'tcl\tpackage-require-runtime\tPASS' \
            $'awk\tsource-runtime\tPASS' \
            $'sed\tsource-filter\tPASS' \
            $'lua\tlua5.1-source-runtime\tPASS' \
            $'lua\tlua5.4-source-runtime\tPASS' \
            $'lua\tlua-5.1-luarocks-install\tPASS' \
            $'lua\tlua-5.1-packed-rock-read-only-init\tPASS' \
            $'lua\tlua-5.4-luarocks-install\tPASS' \
            $'zsh\tsource-runtime\tPASS' \
            $'fish\tsource-runtime\tPASS' \
            $'elvish\tsource-runtime\tPASS' \
            $'nushell\tsource-runtime\tPASS' \
            $'powershell\tsource-runtime\tPASS' \
            $'guix-scheme\tguile-runtime\tPASS' \
            $'guix-scheme\tguix-definition\tPASS'; do
            grep -F $'RESULT\t'"$expected"$'\t' "$evidence" >/dev/null
          done
          for artifact in tcl awk sed lua zsh fish elvish nushell powershell guix-scheme; do
            test -s "dist/sshfling-$artifact-$SSHFLING_VERSION.tar.gz"
          done
          test -s "dist/sshfling-$SSHFLING_VERSION-1.all.rock"

  language-catalog-source-packages:
    name: Functional and systems language source packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Build source packages and collect runtime-gate evidence
        env:
          SSHFLING_VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          set -euo pipefail
          make package-language-catalog VERSION="$SSHFLING_VERSION"
          mapfile -t expected_files < <(
            bash packaging/list-language-release-artifacts.sh "$SSHFLING_VERSION" all
          )
          printf '%s\n' "${expected_files[@]}" | sort >"$RUNNER_TEMP/expected-language-files.txt"
          find dist -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort \
            >"$RUNNER_TEMP/actual-language-files.txt"
          diff -u "$RUNNER_TEMP/expected-language-files.txt" "$RUNNER_TEMP/actual-language-files.txt"
          for file in "${expected_files[@]}"; do
            test -s "dist/$file"
          done
          for evidence in dist/sshfling-*-languages-"$SSHFLING_VERSION"-validation.tsv; do
            test -s "$evidence"
            ! grep -Eq $'\t(FAIL|FAILED)\t' "$evidence"
          done

  dart-language-consumer:
    name: Dart compiled server consumer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-version
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.2"
      - name: Compile and run the typed Dart adapter
        run: make package-dart-consumer VERSION="${{ needs.validate-version.outputs.version }}"

  linux-public-repos:
    name: Linux public repo installs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm
            image: debian:bookworm-slim
            command: |
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh apt
          - name: debian-trixie
            image: debian:trixie-slim
            command: |
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh apt
          - name: ubuntu-22.04
            image: ubuntu:22.04
            command: |
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh apt
          - name: ubuntu-24.04
            image: ubuntu:24.04
            command: |
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh apt
          - name: fedora
            image: fedora:latest
            command: |
              dnf install -y ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh dnf
          - name: rocky
            image: rockylinux:9
            command: |
              dnf install -y ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh dnf
          - name: alma
            image: almalinux:9
            command: |
              dnf install -y ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh dnf
          - name: ubi
            image: registry.access.redhat.com/ubi9/ubi
            command: |
              dnf install -y ca-certificates curl sudo >/dev/null
              curl -fsSL https://grwlx.github.io/sshfling/install.sh -o /tmp/sshfling-install.sh
              bash /tmp/sshfling-install.sh dnf
    steps:
      - uses: actions/checkout@v5

      - name: Install and check ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" "${{ matrix.image }}" bash -lc 'set -euo pipefail
          ${{ matrix.command }}
          /tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"'

  linux-community-builds:
    name: Linux community package builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arch
            image: archlinux:latest
            command: |
              pacman -Sy --noconfirm --needed base-devel curl sudo >/dev/null
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >/etc/sudoers.d/builder
              install -d -o builder -g builder /build
              cd /build
              sudo -u builder curl -fsSLO https://grwlx.github.io/sshfling/arch/PKGBUILD
              sudo -u builder makepkg -si --noconfirm --needed >/dev/null
          - name: alpine
            image: alpine:3.20
            command: |
              apk add --no-cache alpine-sdk curl python3 openssh-client shadow procps util-linux >/dev/null
              adduser -D builder
              addgroup builder abuild
              install -d -o builder -g builder /build
              cd /build
              su builder -c "curl -fsSLO https://grwlx.github.io/sshfling/alpine/APKBUILD"
              su builder -c "abuild-keygen -a -n"
              cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/
              chown -R builder:builder /build
              su builder -c "cd /build && abuild checksum && abuild -r" >/tmp/alpine-build.log
              apk_file="$(find /home/builder/packages -name "sshfling-${{ needs.validate-version.outputs.version }}-r0.apk" -print -quit)"
              test -n "$apk_file"
              apk add "$apk_file" >/dev/null
    steps:
      - uses: actions/checkout@v5

      - name: Build/install ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" "${{ matrix.image }}" sh -lc 'set -eu
          ${{ matrix.command }}
          /tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"'

  opensuse-spec:
    name: openSUSE OBS spec build
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Build and install generated openSUSE spec
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" opensuse/tumbleweed bash -lc 'set -euo pipefail
          zypper --non-interactive --gpg-auto-import-keys refresh >/dev/null
          zypper --non-interactive --gpg-auto-import-keys install rpm-build curl tar gzip python3 jq openssh shadow procps util-linux >/dev/null
          mkdir -p /root/rpmbuild/SOURCES /root/rpmbuild/SPECS
          curl -fsSL https://grwlx.github.io/sshfling/downloads/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz -o /root/rpmbuild/SOURCES/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
          curl -fsSL https://grwlx.github.io/sshfling/opensuse/sshfling.spec -o /root/rpmbuild/SPECS/sshfling.spec
          rpmbuild --define "_topdir /root/rpmbuild" -ba /root/rpmbuild/SPECS/sshfling.spec >/tmp/opensuse-rpmbuild.log
          rpm -Uvh /root/rpmbuild/RPMS/noarch/sshfling-${{ needs.validate-version.outputs.version }}-1.noarch.rpm >/dev/null
          test -x /usr/libexec/sshfling/sshfling-linux-account
          test -x /usr/libexec/sshfling/sshfling-unix-identity
          /usr/libexec/sshfling/sshfling-linux-account identity root | grep -Fq "status=present"
          /usr/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq "uid=0"
          bash /tests/cross-os/validate-native-session-policy.sh /usr/share/sshfling/templates/production/sshfling-session >/dev/null
          /tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"'

  nix-flake:
    name: Nix flake build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Build generated Nix flake
        env:
          NIX_CONFIG: access-tokens = github.com=${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p nix-test
          curl -fsSL https://grwlx.github.io/sshfling/nix/flake.nix -o nix-test/flake.nix
          docker run --rm -e NIX_CONFIG -v "$PWD/nix-test:/work" -v "$PWD/tests/cross-os:/tests/cross-os:ro" nixos/nix:2.24.9 sh -lc 'set -eu
          cd /work
          NIXPKGS_ALLOW_UNFREE=1 nix --extra-experimental-features "nix-command flakes" build --impure .#default -o result
          runtime_path="$(nix-store -qR ./result | while IFS= read -r store_path; do
            if [ -d "$store_path/bin" ]; then printf "%s:" "$store_path/bin"; fi
          done)"
          runtime_path=${runtime_path%:}
          PATH="$runtime_path:$PATH"
          export PATH
          ./result/libexec/sshfling/sshfling-linux-account identity root | grep -Fq "status=present"
          ./result/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq "uid=0"
          bash /tests/cross-os/validate-native-login-shell.sh ./result/share/sshfling/templates/production/sshfling-login-shell >/dev/null
          bash /tests/cross-os/validate-native-session-policy.sh ./result/share/sshfling/templates/production/sshfling-session >/dev/null
          /tests/cross-os/validate-cli.sh ./result/bin/sshfling "${{ needs.validate-version.outputs.version }}"'

  slackware-slackbuild:
    name: Slackware SlackBuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Build/install generated SlackBuild
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/tests/cross-os:/tests/cross-os:ro" vbatts/slackware:15.0 /bin/sh -lc 'set -eu
          slackware_bootstrap_mirror=http://slackware.osuosl.org/slackware64-15.0
          slackware_https_mirror=https://slackware.osuosl.org/slackware64-15.0
          printf "%s\n" "${slackware_bootstrap_mirror}/" >/etc/slackpkg/mirrors
          slackpkg -batch=on -default_answer=y update >/tmp/slackpkg-update.log 2>&1 || { cat /tmp/slackpkg-update.log; exit 1; }
          slackpkg -batch=on -default_answer=y install ca-certificates >/tmp/slackpkg-ca-certificates.log 2>&1 || { cat /tmp/slackpkg-ca-certificates.log; exit 1; }
          slackpkg -batch=on -default_answer=y install openssh >/tmp/slackpkg-openssh.log 2>&1 || { cat /tmp/slackpkg-openssh.log; exit 1; }
          if command -v update-ca-certificates >/dev/null 2>&1; then update-ca-certificates >/tmp/update-ca-certificates.log 2>&1 || true; fi
          ssl_ca=/etc/ssl/certs/ca-certificates.crt
          test -s "$ssl_ca"
          wget --ca-certificate="$ssl_ca" -qO /tmp/jq https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64
          printf '%s  %s\n' 020468de7539ce70ef1bceaf7cde2e8c4f2ca6c3afb84642aabc5c97d9fc2a0d /tmp/jq | sha256sum -c -
          install -m 0755 /tmp/jq /usr/local/bin/jq
          wget --ca-certificate="$ssl_ca" -qO /tmp/python3.txz "$slackware_https_mirror/slackware64/d/python3-3.9.10-x86_64-1.txz"
          installpkg /tmp/python3.txz >/tmp/install-python3.log
          mkdir -p /tmp/slacktest
          cd /tmp/slacktest
          wget --ca-certificate="$ssl_ca" -qO sshfling.SlackBuild https://grwlx.github.io/sshfling/slackware/sshfling.SlackBuild
          wget --ca-certificate="$ssl_ca" -qO slack-desc https://grwlx.github.io/sshfling/slackware/slack-desc
          wget --ca-certificate="$ssl_ca" -qO sshfling-${{ needs.validate-version.outputs.version }}.tar.gz https://grwlx.github.io/sshfling/downloads/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
          chmod +x sshfling.SlackBuild
          ./sshfling.SlackBuild >/tmp/slackbuild.log
          installpkg /tmp/sshfling-${{ needs.validate-version.outputs.version }}-noarch-1_SBo.txz >/tmp/installpkg.log
          /tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"'

  void-template:
    name: Void xbps-src template
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Build/install generated Void template
        run: |
          set -euo pipefail
          docker run --rm --privileged -v /dev:/dev -v "$PWD/tests/cross-os:/tests/cross-os:ro" ghcr.io/void-linux/void-glibc-full:latest sh -lc 'set -eu
          xbps-install -Syu -y xbps >/dev/null || true
          xbps-install -Syu -y git curl base-devel python3 openssh bash sudo >/dev/null
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >/etc/sudoers.d/builder
          git clone --depth 1 https://github.com/void-linux/void-packages.git /void-packages >/dev/null
          mkdir -p /void-packages/srcpkgs/sshfling
          curl -fsSL https://grwlx.github.io/sshfling/void/template -o /void-packages/srcpkgs/sshfling/template
          chown -R builder:builder /void-packages
          sudo -Eu builder sh -lc "cd /void-packages && common/travis/prepare.sh >/tmp/void-bootstrap.log && ./xbps-src pkg sshfling >/tmp/void-build.log" || {
            cat /tmp/void-bootstrap.log || true
            cat /tmp/void-build.log || true
            exit 1
          }
          xbps-install -y --repository=/void-packages/hostdir/binpkgs sshfling >/dev/null
          /tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"'

  freebsd-source-smoke:
    name: FreeBSD source runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          prepare: |
            pkg install -y curl python3 openssh-portable
          run: |
            set -eu
            workspace="$(pwd)"
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            tar -xzf sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            src="$tmp/sshfling-${{ needs.validate-version.outputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/local/bin/sshfling
            mkdir -p /usr/local/libexec/sshfling /usr/local/share/sshfling/templates
            install -m 0755 "$src/native/sshfling-unix-identity" /usr/local/libexec/sshfling/sshfling-unix-identity
            /usr/local/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq 'uid=0'
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/native "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/local/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/local/bin/sshfling "${{ needs.validate-version.outputs.version }}"

  openbsd-source-smoke:
    name: OpenBSD source runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/openbsd-vm@v1
        with:
          release: "7.9"
          usesh: true
          prepare: |
            pkg_add curl python%3
          run: |
            set -eu
            workspace="$(pwd)"
            export PATH="/usr/local/bin:$PATH"
            if ! command -v python3 >/dev/null 2>&1; then
              py="$(ls /usr/local/bin/python3.* | head -n 1)"
              ln -sf "$py" /usr/local/bin/python3
            fi
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            tar -xzf sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            src="$tmp/sshfling-${{ needs.validate-version.outputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/local/bin/sshfling
            mkdir -p /usr/local/libexec/sshfling /usr/local/share/sshfling/templates
            install -m 0755 "$src/native/sshfling-unix-identity" /usr/local/libexec/sshfling/sshfling-unix-identity
            /usr/local/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq 'uid=0'
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/native "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/local/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/local/bin/sshfling "${{ needs.validate-version.outputs.version }}"

  netbsd-source-smoke:
    name: NetBSD source runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - uses: vmactions/netbsd-vm@v1
        with:
          release: "10.1"
          usesh: true
          prepare: |
            export PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/x86_64/10.1/All"
            if ! command -v curl >/dev/null 2>&1; then
              /usr/sbin/pkg_add curl
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              /usr/sbin/pkg_add python313 || /usr/sbin/pkg_add python312 || /usr/sbin/pkg_add python311
            fi
          run: |
            set -eu
            workspace="$(pwd)"
            export PATH="/usr/pkg/bin:$PATH"
            if ! command -v python3 >/dev/null 2>&1; then
              py="$(ls /usr/pkg/bin/python3.* | head -n 1)"
              ln -sf "$py" /usr/pkg/bin/python3
            fi
            tmp="$(mktemp -d)"
            cd "$tmp"
            curl -fsSLO https://grwlx.github.io/sshfling/downloads/sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            tar -xzf sshfling-${{ needs.validate-version.outputs.version }}.tar.gz
            src="$tmp/sshfling-${{ needs.validate-version.outputs.version }}"
            install -m 0755 "$src/bin/sshfling" /usr/pkg/bin/sshfling
            mkdir -p /usr/pkg/libexec/sshfling /usr/pkg/share/sshfling/templates
            install -m 0755 "$src/native/sshfling-unix-identity" /usr/pkg/libexec/sshfling/sshfling-unix-identity
            /usr/pkg/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq 'uid=0'
            cp -Rp "$src"/.env.example "$src"/LICENSE "$src"/README.md "$src"/compose.server.yml "$src"/compose.client.yml "$src"/native "$src"/scripts "$src"/secrets "$src"/ssh-client "$src"/ssh-server "$src"/production "$src"/systemd /usr/pkg/share/sshfling/templates/
            "$workspace/tests/cross-os/validate-cli.sh" /usr/pkg/bin/sshfling "${{ needs.validate-version.outputs.version }}"

  macos-pkg:
    name: macOS pkg install
    runs-on: macos-latest
    timeout-minutes: 15
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Install published pkg
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          pkg="/tmp/sshfling-${version}.pkg"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-${version}.pkg" -o "$pkg"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS" -o /tmp/SHA256SUMS
          grep "  sshfling-${version}.pkg$" /tmp/SHA256SUMS > /tmp/sshfling.SHA256SUMS
          (cd /tmp && shasum -a 256 -c sshfling.SHA256SUMS)
          pkgutil --check-signature "$pkg"
          xcrun stapler validate "$pkg"
          spctl -a -vv -t install "$pkg"
          sudo installer -pkg "$pkg" -target /
          tests/cross-os/validate-cli.sh /usr/local/bin/sshfling "$version"
          /usr/local/libexec/sshfling/sshfling-unix-identity identity root | grep -Fq 'uid=0'
          cmp native/sshfling-unix-identity /usr/local/libexec/sshfling/sshfling-unix-identity
          cmp production/sshfling-login-shell /usr/local/share/sshfling/templates/production/sshfling-login-shell
          cmp production/sshfling-session /usr/local/share/sshfling/templates/production/sshfling-session
          test "$(stat -f '%Lp' /usr/local/libexec/sshfling/sshfling-unix-identity)" = 755
          test "$(stat -f '%Lp' /usr/local/share/sshfling/templates/production/sshfling-login-shell)" = 755
          test "$(stat -f '%Lp' /usr/local/share/sshfling/templates/production/sshfling-session)" = 755
          brew install jq flock
          tests/cross-os/validate-native-login-shell.sh /usr/local/share/sshfling/templates/production/sshfling-login-shell
          tests/cross-os/validate-native-session-policy.sh /usr/local/share/sshfling/templates/production/sshfling-session

  macos-homebrew:
    name: Homebrew formula install
    runs-on: macos-latest
    timeout-minutes: 20
    needs: validate-version
    steps:
      - uses: actions/checkout@v5

      - name: Install published formula
        run: |
          set -euo pipefail
          curl -fsSL https://grwlx.github.io/sshfling/homebrew/sshfling.rb -o /tmp/sshfling.rb
          brew tap-new grwlx/sshfling-test
          tap_dir="$(brew --repository grwlx/sshfling-test)"
          mkdir -p "$tap_dir/Formula"
          cp /tmp/sshfling.rb "$tap_dir/Formula/sshfling.rb"
          brew install grwlx/sshfling-test/sshfling
          tests/cross-os/validate-cli.sh sshfling "${{ needs.validate-version.outputs.version }}"
          formula_prefix="$(brew --prefix grwlx/sshfling-test/sshfling)"
          "$formula_prefix/libexec/sshfling/sshfling-unix-identity" identity root | grep -Fq 'uid=0'
          cmp native/sshfling-unix-identity "$formula_prefix/libexec/sshfling/sshfling-unix-identity"
          cmp production/sshfling-login-shell "$(brew --prefix)/share/sshfling/templates/production/sshfling-login-shell"
          cmp production/sshfling-session "$(brew --prefix)/share/sshfling/templates/production/sshfling-session"
          tests/cross-os/validate-native-login-shell.sh "$(brew --prefix)/share/sshfling/templates/production/sshfling-login-shell"
          tests/cross-os/validate-native-session-policy.sh "$(brew --prefix)/share/sshfling/templates/production/sshfling-session"

  windows-msi:
    name: Windows MSI install
    runs-on: windows-latest
    needs: validate-version
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install published MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.validate-version.outputs.version }}"
          $msi = Join-Path $env:TEMP "sshfling-$version.msi"
          $sums = Join-Path $env:TEMP "SHA256SUMS"
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/sshfling-$version.msi?run=${{ github.run_id }}" -OutFile $msi
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -OutFile $sums
          $expectedLine = Get-Content $sums | Where-Object { $_ -match "  sshfling-$version\.msi$" } | Select-Object -First 1
          if (-not $expectedLine) {
            throw "SHA256SUMS does not contain sshfling-$version.msi"
          }
          $expectedHash = ($expectedLine -split "\s+")[0].ToLowerInvariant()
          $actualHash = (Get-FileHash -Algorithm SHA256 -Path $msi).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "SHA-256 mismatch for sshfling-$version.msi"
          }
          $signature = Get-AuthenticodeSignature -FilePath $msi
          if ($signature.Status -ne "Valid") {
            throw "MSI Authenticode signature is not valid: $($signature.Status)"
          }
          $proc = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @("/i", $msi, "/qn", "/norestart")
          if ($proc.ExitCode -notin @(0, 3010, 1641)) {
            throw "msiexec install failed with exit code $($proc.ExitCode)"
          }
          $candidates = @(
            (Join-Path $env:ProgramFiles "SSHFling\sshfling.cmd"),
            (Join-Path ${env:ProgramFiles(x86)} "SSHFling\sshfling.cmd")
          )
          $cmd = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $cmd) {
            Get-ChildItem -Path $env:ProgramFiles, ${env:ProgramFiles(x86)} -Filter sshfling.cmd -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "Installed sshfling.cmd was not found"
          }
          tests\cross-os\validate-cli.ps1 -CommandPath $cmd -Version $version
          $proc = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @("/x", $msi, "/qn", "/norestart")
          if ($proc.ExitCode -notin @(0, 3010, 1605, 1614, 1641)) {
            throw "msiexec uninstall failed with exit code $($proc.ExitCode)"
          }
          $remainingCommands = $candidates | Where-Object { Test-Path $_ }
          if ($remainingCommands) {
            throw "MSI uninstall left installed command(s): $($remainingCommands -join ', ')"
          }
          $remainingDirs = @(
            (Join-Path $env:ProgramFiles "SSHFling"),
            (Join-Path ${env:ProgramFiles(x86)} "SSHFling")
          ) | Where-Object { Test-Path $_ }
          if ($remainingDirs) {
            throw "MSI uninstall left install directory/directories: $($remainingDirs -join ', ')"
          }
          $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          foreach ($candidate in $candidates) {
            $dir = Split-Path -Parent $candidate
            if (($machinePath -split ';' | Where-Object { $_.TrimEnd('\') -ieq $dir.TrimEnd('\') }).Count -gt 0) {
              throw "MSI uninstall left install directory in machine PATH: $dir"
            }
          }

  windows-zip:
    name: Windows zip run
    runs-on: windows-latest
    needs: validate-version
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Run published Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.validate-version.outputs.version }}"
          $zip = Join-Path $env:TEMP "sshfling-$version-windows.zip"
          $sums = Join-Path $env:TEMP "SHA256SUMS"
          $dest = Join-Path $env:TEMP "sshfling-zip"
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/sshfling-$version-windows.zip?run=${{ github.run_id }}" -OutFile $zip
          Invoke-WebRequest -Uri "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -OutFile $sums
          $zipName = "sshfling-$version-windows.zip"
          $expected = Get-Content $sums | ForEach-Object {
            $parts = $_ -split '\s+', 2
            if ($parts.Count -eq 2 -and $parts[1] -eq $zipName) { $parts[0] }
          } | Select-Object -First 1
          if (-not $expected) {
            throw "Missing SHA256SUMS entry for Windows zip"
          }
          $expectedHash = $expected.ToLowerInvariant()
          $actualHash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Windows zip SHA256 mismatch: expected $expectedHash got $actualHash"
          }
          Expand-Archive -Force $zip -DestinationPath $dest
          $cmd = Join-Path $dest "sshfling.cmd"
          tests\cross-os\validate-cli.ps1 -CommandPath $cmd -Version $version

  dotnet-tool:
    name: .NET global tool run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install and validate published .NET tool
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SSHFling.Tool.${version}.nupkg?run=${{ github.run_id }}" -o "$tmp/SSHFling.Tool.${version}.nupkg"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SSHFling.${version}.nupkg?run=${{ github.run_id }}" -o "$tmp/SSHFling.${version}.nupkg"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  SSHFling.Tool.${version}.nupkg$" "$tmp/SHA256SUMS" >"$tmp/SSHFling.Tool.SHA256SUMS"
          grep "  SSHFling.${version}.nupkg$" "$tmp/SHA256SUMS" >"$tmp/SSHFling.SHA256SUMS"
          (cd "$tmp" && sha256sum -c SSHFling.Tool.SHA256SUMS && sha256sum -c SSHFling.SHA256SUMS)
          dotnet tool install SSHFling.Tool \
            --tool-path "$tmp/tool" \
            --add-source "$tmp" \
            --version "$version" \
            --ignore-failed-sources
          "$tmp/tool/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/tool/sshfling" --project-dir "$tmp/project" doctor >/dev/null
          "$tmp/tool/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -x "$tmp/project/scripts/uninstall-local.sh"
          test -x "$tmp/project/production/sshfling-session"
          test -f "$tmp/project/secrets/.gitkeep"

          cp -R packaging/dotnet/SSHFling.Consumer "$tmp/library-consumer"
          dotnet restore "$tmp/library-consumer/SSHFling.Consumer.csproj" \
            --source "$tmp" \
            -p:SSHFlingVersion="$version"
          dotnet run \
            --project "$tmp/library-consumer/SSHFling.Consumer.csproj" \
            --configuration Release \
            --no-restore \
            -p:SSHFlingVersion="$version" \
            -- "$version" --version | grep -Fx "sshfling $version"
          dotnet remove "$tmp/library-consumer/SSHFling.Consumer.csproj" package SSHFling

          for consumer in visual-basic fsharp; do
            case "$consumer" in
              visual-basic)
                source_dir="packaging/dotnet/SSHFling.Consumer.VB"
                project="SSHFling.Consumer.VB.vbproj"
                ;;
              fsharp)
                source_dir="packaging/dotnet/SSHFling.Consumer.FSharp"
                project="SSHFling.Consumer.FSharp.fsproj"
                ;;
            esac
            consumer_dir="$tmp/library-consumer-$consumer"
            cp -R "$source_dir" "$consumer_dir"
            dotnet restore "$consumer_dir/$project" \
              --source "$tmp" \
              -p:SSHFlingVersion="$version"
            dotnet run \
              --project "$consumer_dir/$project" \
              --configuration Release \
              --no-restore \
              -p:SSHFlingVersion="$version" \
              -- "$version" --version | grep -Fx "sshfling $version"
            dotnet remove "$consumer_dir/$project" package SSHFling
            if grep -Fq 'PackageReference Include="SSHFling"' "$consumer_dir/$project"; then
              echo "$consumer PackageReference remained after dotnet remove." >&2
              exit 1
            fi
          done

  java-jar:
    name: Java executable JAR run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download and validate published Java package
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-cli-${version}.jar?run=${{ github.run_id }}" -o "$tmp/sshfling-cli-${version}.jar"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-cli-${version}-sources.jar?run=${{ github.run_id }}" -o "$tmp/sshfling-cli-${version}-sources.jar"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-cli-${version}-javadoc.jar?run=${{ github.run_id }}" -o "$tmp/sshfling-cli-${version}-javadoc.jar"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-cli-${version}.pom?run=${{ github.run_id }}" -o "$tmp/sshfling-cli-${version}.pom"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  sshfling-cli-${version}.jar$" "$tmp/SHA256SUMS" >"$tmp/sshfling-cli.jar.SHA256SUMS"
          grep "  sshfling-cli-${version}-sources.jar$" "$tmp/SHA256SUMS" >"$tmp/sshfling-cli.sources.SHA256SUMS"
          grep "  sshfling-cli-${version}-javadoc.jar$" "$tmp/SHA256SUMS" >"$tmp/sshfling-cli.javadoc.SHA256SUMS"
          grep "  sshfling-cli-${version}.pom$" "$tmp/SHA256SUMS" >"$tmp/sshfling-cli.pom.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-cli.jar.SHA256SUMS && sha256sum -c sshfling-cli.sources.SHA256SUMS && sha256sum -c sshfling-cli.javadoc.SHA256SUMS && sha256sum -c sshfling-cli.pom.SHA256SUMS)
          java -jar "$tmp/sshfling-cli-${version}.jar" --version | grep -Fx "sshfling $version"
          java -jar "$tmp/sshfling-cli-${version}.jar" --project-dir "$tmp/project" doctor >/dev/null
          java -jar "$tmp/sshfling-cli-${version}.jar" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -x "$tmp/project/scripts/uninstall-local.sh"
          test -x "$tmp/project/production/sshfling-session"
          test -f "$tmp/project/secrets/.gitkeep"

          mvn -B -Dmaven.repo.local="$tmp/m2" install:install-file \
            -Dfile="$tmp/sshfling-cli-${version}.jar" \
            -DpomFile="$tmp/sshfling-cli-${version}.pom" \
            -Dsources="$tmp/sshfling-cli-${version}-sources.jar" \
            -Djavadoc="$tmp/sshfling-cli-${version}-javadoc.jar"
          cp -R packaging/java/consumers/maven "$tmp/maven-consumer"
          mvn -B -f "$tmp/maven-consumer/pom.xml" \
            -Dmaven.repo.local="$tmp/m2" \
            -Dsshfling.version="$version" package
          java -cp "$tmp/maven-consumer/target/classes:$tmp/sshfling-cli-${version}.jar" \
            io.sshfling.validation.MavenConsumer --version | grep -Fx "sshfling $version"

          for language in kotlin scala groovy; do
            case "$language" in
              kotlin) main_class="io.sshfling.validation.KotlinConsumer" ;;
              scala) main_class="io.sshfling.validation.ScalaConsumer" ;;
              groovy) main_class="io.sshfling.validation.GroovyConsumer" ;;
            esac
            consumer_dir="$tmp/$language-consumer"
            cp -R "packaging/java/consumers/$language" "$consumer_dir"
            mvn -B -f "$consumer_dir/pom.xml" \
              -Dmaven.repo.local="$tmp/m2" \
              -Dsshfling.version="$version" \
              -Dstyle.color=never \
              package
            mvn -B -q -f "$consumer_dir/pom.xml" \
              -Dmaven.repo.local="$tmp/m2" \
              -Dsshfling.version="$version" \
              -Dstyle.color=never \
              -Dexec.mainClass="$main_class" \
              -Dexec.args=--version \
              exec:java | grep -Fx "sshfling $version"
          done

          cp -R packaging/java/consumers/clojure "$tmp/clojure-consumer"
          mvn -B -f "$tmp/clojure-consumer/pom.xml" \
            -Dmaven.repo.local="$tmp/m2" \
            -Dsshfling.version="$version" \
            -Dstyle.color=never \
            verify
          mvn -B -q -f "$tmp/clojure-consumer/pom.xml" \
            -Dmaven.repo.local="$tmp/m2" \
            -Dsshfling.version="$version" \
            -Dstyle.color=never \
            -Dexec.mainClass=clojure.main \
            -Dexec.args="-m io.sshfling.validation.clojure-consumer --version" \
            exec:java | grep -Fx "sshfling $version"

          cp -R packaging/java/consumers/gradle "$tmp/gradle-consumer"
          packaging/java/gradlew --no-daemon --console=plain \
            -p "$tmp/gradle-consumer" \
            -PsshflingVersion="$version" \
            -PsshflingRepository="$tmp/m2" \
            run --args=--version | grep -Fx "sshfling $version"

          for language in kotlin scala groovy; do
            case "$language" in
              kotlin) class_file="build/classes/kotlin/main/io/sshfling/validation/KotlinGradleConsumer.class" ;;
              scala) class_file="build/classes/scala/main/io/sshfling/validation/ScalaGradleConsumer.class" ;;
              groovy) class_file="build/classes/groovy/main/io/sshfling/validation/GroovyGradleConsumer.class" ;;
            esac
            consumer_dir="$tmp/$language-gradle-consumer"
            cp -R "packaging/java/consumers/$language-gradle" "$consumer_dir"
            packaging/java/gradlew --no-daemon --console=plain \
              -p "$consumer_dir" \
              -PsshflingVersion="$version" \
              -PsshflingRepository="$tmp/m2" \
              run --args=--version | grep -Fx "sshfling $version"
            test -s "$consumer_dir/$class_file"
            javap -verbose "$consumer_dir/$class_file" | grep -F "major version: 55"
          done

          cp -R packaging/java/consumers/clojure-gradle "$tmp/clojure-gradle-consumer"
          packaging/java/gradlew --no-daemon --console=plain \
            -p "$tmp/clojure-gradle-consumer" \
            -PsshflingVersion="$version" \
            -PsshflingRepository="$tmp/m2" \
            clean check
          packaging/java/gradlew --no-daemon --console=plain \
            -p "$tmp/clojure-gradle-consumer" \
            -PsshflingVersion="$version" \
            -PsshflingRepository="$tmp/m2" \
            run --args=--version | grep -Fx "sshfling $version"

  node-npm:
    name: Node.js npm package run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download and validate published npm package
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/sshfling-${version}.tgz?run=${{ github.run_id }}" -o "$tmp/sshfling-${version}.tgz"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  sshfling-${version}.tgz$" "$tmp/SHA256SUMS" >"$tmp/sshfling-npm.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-npm.SHA256SUMS)
          npm install --prefix "$tmp/app" "$tmp/sshfling-${version}.tgz" >/dev/null
          "$tmp/app/node_modules/.bin/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/app/node_modules/.bin/sshfling" --project-dir "$tmp/project" doctor >/dev/null
          "$tmp/app/node_modules/.bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -x "$tmp/project/scripts/uninstall-local.sh"
          test -x "$tmp/project/production/sshfling-session"
          test -f "$tmp/project/secrets/.gitkeep"
          (
            cd "$tmp/app"
            node -e 'const api = require("sshfling"); if (typeof api.run !== "function") throw new Error("CommonJS import failed");'
            node --input-type=module -e 'const mod = await import("sshfling"); const api = mod.default || mod; if (typeof api.run !== "function") throw new Error("ESM import failed");'
          )
          SSHFLING_NPM_PACKAGE="$tmp/sshfling-${version}.tgz" \
            bash packaging/build-web-language-consumers.sh \
              react vue svelte angular elm purescript rescript html-css
          npm uninstall --prefix "$tmp/app" sshfling >/dev/null
          test ! -e "$tmp/app/node_modules/.bin/sshfling"

  python-wheel:
    name: Python ${{ matrix.python }} wheel run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Download and validate published Python wheel
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          wheel="sshfling-${version}-py3-none-any.whl"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${wheel}?run=${{ github.run_id }}" -o "$tmp/$wheel"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${wheel}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-python.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-python.SHA256SUMS)
          python -m venv "$tmp/venv"
          "$tmp/venv/bin/python" -m pip install --no-deps --no-index "$tmp/$wheel" >/dev/null
          "$tmp/venv/bin/python" -c 'import sshfling; assert sshfling.__version__'
          "$tmp/venv/bin/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/venv/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -f "$tmp/project/secrets/.gitkeep"
          "$tmp/venv/bin/python" -m pip uninstall --yes sshfling >/dev/null
          test ! -e "$tmp/venv/bin/sshfling"

  go-module:
    name: Go module run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Download and validate published Go module
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          archive="sshfling-go-${version}.zip"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${archive}?run=${{ github.run_id }}" -o "$tmp/$archive"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${archive}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-go.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-go.SHA256SUMS)
          unzip -q "$tmp/$archive" -d "$tmp/source"
          (cd "$tmp/source/sshfling-go-${version}" && GOBIN="$tmp/bin" go install ./cmd/sshfling)
          "$tmp/bin/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -f "$tmp/project/secrets/.gitkeep"
          rm -f "$tmp/bin/sshfling"
          test ! -e "$tmp/bin/sshfling"

  rust-crate:
    name: Rust crate run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cargo rustc

      - name: Download and validate published Rust crate
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          crate="sshfling-cli-${version}.crate"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${crate}?run=${{ github.run_id }}" -o "$tmp/$crate"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${crate}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-rust.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-rust.SHA256SUMS)
          mkdir "$tmp/source"
          tar -xzf "$tmp/$crate" -C "$tmp/source"
          cargo install --path "$tmp/source/sshfling-cli-${version}" --root "$tmp/install" --offline --locked
          "$tmp/install/bin/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/install/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -f "$tmp/project/secrets/.gitkeep"
          cargo uninstall --root "$tmp/install" sshfling-cli
          test ! -e "$tmp/install/bin/sshfling"

  php-composer:
    name: PHP Composer package run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP and Composer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends composer php-cli php-zip

      - name: Download and validate published Composer package
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          archive="sshfling-php-${version}.zip"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${archive}?run=${{ github.run_id }}" -o "$tmp/$archive"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${archive}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-php.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-php.SHA256SUMS)
          mkdir -p "$tmp/artifacts" "$tmp/app"
          cp "$tmp/$archive" "$tmp/artifacts/"
          php -r '$m=["repositories"=>[["type"=>"artifact","url"=>$argv[2]]],"require"=>["grwlx/sshfling"=>$argv[3]],"config"=>["allow-plugins"=>false]]; file_put_contents($argv[1], json_encode($m, JSON_PRETTY_PRINT|JSON_UNESCAPED_SLASHES).PHP_EOL);' "$tmp/app/composer.json" "$tmp/artifacts" "$version"
          COMPOSER_ALLOW_SUPERUSER=1 composer install --working-dir "$tmp/app" --no-dev --no-plugins --no-scripts --prefer-dist >/dev/null
          "$tmp/app/vendor/bin/sshfling" --version | grep -Fx "sshfling $version"
          "$tmp/app/vendor/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -f "$tmp/project/secrets/.gitkeep"
          COMPOSER_ALLOW_SUPERUSER=1 composer remove --working-dir "$tmp/app" --no-plugins --no-scripts grwlx/sshfling >/dev/null
          test ! -e "$tmp/app/vendor/bin/sshfling"

  ruby-gem:
    name: Ruby gem run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Ruby
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ruby

      - name: Download and validate published Ruby gem
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          package="sshfling-${version}.gem"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${package}?run=${{ github.run_id }}" -o "$tmp/$package"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${package}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-ruby.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-ruby.SHA256SUMS)
          mkdir -p "$tmp/gem-home" "$tmp/bin"
          GEM_HOME="$tmp/gem-home" GEM_PATH="$tmp/gem-home" gem install --local --install-dir "$tmp/gem-home" --bindir "$tmp/bin" --no-document "$tmp/$package" >/dev/null
          GEM_HOME="$tmp/gem-home" GEM_PATH="$tmp/gem-home" "$tmp/bin/sshfling" --version | grep -Fx "sshfling $version"
          GEM_HOME="$tmp/gem-home" GEM_PATH="$tmp/gem-home" "$tmp/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/scripts/install-local.sh"
          test -f "$tmp/project/secrets/.gitkeep"
          GEM_HOME="$tmp/gem-home" GEM_PATH="$tmp/gem-home" gem uninstall --all --executables --ignore-dependencies --bindir "$tmp/bin" sshfling >/dev/null
          test ! -e "$tmp/bin/sshfling"

  native-libraries:
    name: C and C++ native library run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++ make ninja-build pkg-config

      - name: Download and validate published native libraries
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          archive="sshfling-native-${version}.tar.gz"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${archive}?run=${{ github.run_id }}" -o "$tmp/$archive"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${archive}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-native.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-native.SHA256SUMS)
          tar -xzf "$tmp/$archive" -C "$tmp"
          source_dir="$tmp/sshfling-native-${version}"
          prefix="$tmp/install"

          cmake -S "$source_dir" -B "$tmp/build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$prefix" \
            -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build "$tmp/build" --parallel
          SSHFLING_C_RUNTIME_DIR="$source_dir/runtime" \
            ctest --test-dir "$tmp/build" --output-on-failure
          cmake --install "$tmp/build"
          "$prefix/bin/sshfling-c" --version | grep -Fx "sshfling $version"

          cmake -S "$source_dir/consumers/c" -B "$tmp/c-shared" -G Ninja \
            -DCMAKE_PREFIX_PATH="$prefix"
          cmake --build "$tmp/c-shared"
          "$tmp/c-shared/sshfling-c-consumer" "$version" | grep -Fx "sshfling $version"

          cmake -S "$source_dir/consumers/c-static" -B "$tmp/c-static" -G Ninja \
            -DCMAKE_PREFIX_PATH="$prefix"
          cmake --build "$tmp/c-static"
          "$tmp/c-static/sshfling-c-static-consumer" "$version" | grep -Fx "sshfling $version"

          cmake -S "$source_dir/consumers/cpp" -B "$tmp/cpp-static" -G Ninja \
            -DCMAKE_PREFIX_PATH="$prefix"
          cmake --build "$tmp/cpp-static"
          "$tmp/cpp-static/sshfling-cpp-consumer" "$version" | grep -Fx "sshfling $version"

          PKG_CONFIG_PATH="$prefix/lib/pkgconfig" \
            cc "$source_dir/consumers/c/main.c" \
              $(PKG_CONFIG_PATH="$prefix/lib/pkgconfig" pkg-config --cflags --libs sshfling) \
              -o "$tmp/pkg-config-consumer"
          LD_LIBRARY_PATH="$prefix/lib" \
            "$tmp/pkg-config-consumer" "$version" | grep -Fx "sshfling $version"

          rm -rf "$prefix"
          test ! -e "$prefix/bin/sshfling-c"

  perl-module:
    name: Perl module and executable run
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Perl build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make perl

      - name: Download and validate published Perl distribution
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          archive="sshfling-perl-${version}.tar.gz"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/${archive}?run=${{ github.run_id }}" -o "$tmp/$archive"
          curl -fsSL "https://grwlx.github.io/sshfling/downloads/SHA256SUMS?run=${{ github.run_id }}" -o "$tmp/SHA256SUMS"
          grep "  ${archive}$" "$tmp/SHA256SUMS" >"$tmp/sshfling-perl.SHA256SUMS"
          (cd "$tmp" && sha256sum -c sshfling-perl.SHA256SUMS)
          tar -xzf "$tmp/$archive" -C "$tmp"

          source_dir="$tmp/SSHFling-${version}"
          prefix="$tmp/install"
          (cd "$source_dir" && perl Makefile.PL INSTALL_BASE="$prefix" && make test && make pure_install)
          PERL5LIB="$prefix/lib/perl5" perl -MSSHFling -e \
            'exit SSHFling::version() eq $ARGV[0] && SSHFling::run("--version") == 0 ? 0 : 1' \
            "$version"
          PERL5LIB="$prefix/lib/perl5" "$prefix/bin/sshfling" --version | grep -Fx "sshfling $version"
          PERL5LIB="$prefix/lib/perl5" "$prefix/bin/sshfling" init "$tmp/project" --force --session-seconds 60 >/dev/null
          test -x "$tmp/project/native/sshfling-linux-account"
          test -x "$tmp/project/native/sshfling-unix-identity"

          rm -rf "$prefix"
          if PERL5LIB="$prefix/lib/perl5" perl -MSSHFling -e 1 >/dev/null 2>&1; then
            echo "Perl distribution remained importable after isolated prefix removal." >&2
            exit 1
          fi
