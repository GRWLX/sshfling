name: Official distro packaging drafts

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate. Defaults to bin/sshfling VERSION."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: official-distro-drafts-${{ github.ref }}-${{ inputs.version || 'source' }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Debian and Fedora packaging drafts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install distro packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autopkgtest build-essential debhelper iproute2 lintian rpm rpmlint

      - name: Validate packaging drafts
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          SSHFLING_AUTOPKGTEST_BACKEND: null
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          make official-distro-draft-validate VERSION="$version"
          make official-distro-submission-prepare VERSION="$version"
          make official-distro-submission-validate VERSION="$version"
