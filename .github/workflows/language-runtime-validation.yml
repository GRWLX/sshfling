name: Language runtime validation

on:
  workflow_call:
    inputs:
      version:
        description: "Version to validate. Defaults to the tag or source version."
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate. Defaults to the tag or source version."
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: language-runtime-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    name: Strict language catalog
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.2"

      - name: Install catalog dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang curl fish fp-compiler fp-units-fcl gcc gcc-multilib git guile-3.0 guix liblua5.1-0-dev liblua5.4-dev libc6-dev-i386 libc6-i386 lua5.1 lua5.4 \
            libcairo2 libfftw3-double3 libglib2.0-0 libgsl27 libgtk-3-0 libpcre2-32-0 libpng16-16 libpq5 libsqlite3-0 libx11-6 libx11-xcb1 libxcb1 \
            openjdk-21-jre-headless \
            luarocks make mawk octave sed tcl unzip xz-utils zsh
          /usr/lib/jvm/java-21-openjdk-amd64/bin/java -version

      - name: Provision pinned promoted-language runtimes
        run: |
          set -euo pipefail
          runtime_path="$(bash tools/provision-promoted-language-runtimes.sh \
            "$RUNNER_TEMP/promoted-language-runtimes")"
          echo "$runtime_path" >>"$GITHUB_PATH"

      - name: Build catalog and require promoted runtime evidence
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
          SSHFLING_JAVA: /usr/lib/jvm/java-21-openjdk-amd64/bin/java
        run: |
          set -euo pipefail
          sudo rm -f /var/guix/daemon-socket/socket
          sudo install -d -m 0755 /var/guix/daemon-socket /gnu/store
          sudo setsid guix-daemon \
            --build-users-group=_guixbuild \
            --listen=/var/guix/daemon-socket/socket \
            >/tmp/sshfling-guix-daemon.log 2>&1 </dev/null &
          for _ in $(seq 1 10); do
            test -S /var/guix/daemon-socket/socket && break
            sleep 1
          done
          test -S /var/guix/daemon-socket/socket
          make package-language-catalog-strict VERSION="$SSHFLING_VERSION"
          while IFS= read -r artifact; do
            test -s "dist/$artifact"
          done < <(bash packaging/list-language-release-artifacts.sh \
            "$SSHFLING_VERSION" all)

      - name: Upload validated language catalog
        uses: actions/upload-artifact@v7
        with:
          name: language-catalog-packages
          path: |
            dist/*.tar.gz
            dist/sshfling-*-languages-*-validation.tsv
            dist/sshfling-${{ steps.version.outputs.version }}-1.all.rock
          if-no-files-found: error
