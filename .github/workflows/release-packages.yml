name: Release packages without web

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version. Defaults to the tag name or bin/sshfling VERSION."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev file rpm

      - name: Validate sources
        run: make test

      - name: Build Debian and RPM packages
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./packaging/build-deb.sh
          ./packaging/build-rpm.sh
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=build \
            --exclude=dist \
            --transform "s,^,sshfling-${SSHFLING_VERSION}/," \
            -czf "dist/sshfling-${SSHFLING_VERSION}.tar.gz" \
            .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Build macOS package
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: ./packaging/build-pkg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: dist/*.pkg
          if-no-files-found: error

  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if ($env:INPUT_VERSION) {
            $version = $env:INPUT_VERSION
          } elseif ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $match = Select-String -Path "bin/sshfling" -Pattern '^VERSION = "([^"]+)"' | Select-Object -First 1
            $version = $match.Matches[0].Groups[1].Value
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Build Windows MSI
        shell: pwsh
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File packaging/build-msi.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs:
      - linux
      - macos
      - windows
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release-dist
          sha256sum * > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
