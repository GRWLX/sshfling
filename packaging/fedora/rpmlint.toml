# Local rpmlint policy for the SSHFling Fedora packaging draft.
#
# These filters do not make the package ready for Fedora review. They separate
# known external gates from regressions the repository can catch automatically.
Filters = [
    ".* E: no-signature$",
    ".* E: no-packager-tag$",
    ".* E: no-group-tag$",
    ".* W: no-buildroot-tag$",
    ".* W: invalid-license Apache-2.0$",
    ".* W: non-standard-gid /etc/sshfling sshflingd$",
    ".* W: non-standard-gid /etc/sshfling/sshflingd.env sshflingd$",
    ".* E: non-standard-dir-perm /etc/sshfling 750$",
    ".* E: non-readable /etc/sshfling/sshflingd.env 640$",
    ".* W: hidden-file-or-dir /usr/share/sshfling/templates/.env.example$",
    ".* W: hidden-file-or-dir /usr/share/sshfling/templates/secrets/.gitkeep$",
    ".* W: files-duplicate /usr/share/sshfling/templates/systemd/sshflingd.env.example /etc/sshfling/sshflingd.env:/usr/share/doc/sshfling-0.1.21/sshflingd.env.example$",
    ".* W: files-duplicate /usr/share/sshfling/templates/README.md /usr/share/doc/sshfling-0.1.21/README.md$",
    ".* W: files-duplicate /usr/share/sshfling/templates/LICENSE /usr/share/licenses/sshfling-0.1.21/LICENSE$",
    ".* W: empty-%preun$",
    ".* W: empty-%postun$",
    ".* W: dangerous-command-in-%post install$",
]

CompressExtension = "gz"
