name: timed-ssh-server

services:
  ssh-server:
    build:
      context: ./ssh-server
    image: timed-ssh-server:latest
    container_name: timed-ssh-server
    environment:
      SSH_SESSION_SECONDS: "${SSH_SESSION_SECONDS:-60}"
      AUTHORIZED_KEYS_FILE: /run/secrets/ssh_authorized_keys
    ports:
      - "${SSH_BIND_ADDRESS:-127.0.0.1}:${SSH_PORT_ON_HOST:-2222}:22"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - SYS_CHROOT
    pids_limit: 128
    read_only: true
    tmpfs:
      - /etc/ssh:rw,noexec,nosuid,nodev,size=1m
      - /home/deploy/.ssh:rw,noexec,nosuid,nodev,size=1m
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    secrets:
      - source: ssh_authorized_keys
        target: ssh_authorized_keys
        mode: 0444
    networks:
      timed-ssh-net:
        aliases:
          - ssh-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /home/deploy/.ssh/authorized_keys && pgrep -x sshd >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

secrets:
  ssh_authorized_keys:
    file: ./secrets/client_ed25519.pub

networks:
  timed-ssh-net:
    external: true
